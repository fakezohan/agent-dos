<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Dos</title>
    <style>
        /* Explicitly remove all document margins so dvh/dvw don't overflow */
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100dvw;
            overflow: hidden; 
            background-color: #FFFFFF; 
            color: black; 
            font-family: sans-serif;
            position: fixed; 
            top: 0;    /* The critical fix: anchors the fixed body to the absolute top */
            left: 0;   /* The critical fix: anchors the fixed body to the absolute left */
            touch-action: none; 
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('resources/backgrounds/web_page_background.webp'); 
            background-repeat: repeat;
            background-size: var(--bg-size, auto); 
            opacity: 0.07; 
            z-index: -1; 
        }

        canvas {
            background-color: #AAAAAA; 
            border: 2px solid #555;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); /* PC Shadow */
            box-sizing: border-box;
            display: block;
            width: 100dvw;
            height: 100dvh;
            max-width: 100dvw;
            max-height: 100dvh;
        }
        
        /* Mobile Specific Canvas Overrides */
        body.is-mobile canvas {
            box-shadow: none;
        }

        /* --- Mobile Controls UI --- */
        #mobile-controls {
            display: none; 
            position: fixed; /* Fixed prevents shifting relative to the document body */
            top: 0; left: 0;
            width: 100dvw; 
            height: 100dvh;
            pointer-events: none;
            z-index: 100;
        }

        .mob-btn {
            position: absolute;
            width: 56px; height: 56px; /* 20% smaller */
            background-color: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: block;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.2s, background-color 0.2s, transform 0.1s, filter 0.2s; 
            background-image: url('resources/hud/mobile_buttons_sprite_sheet.webp');
            background-size: 200% 300%;
            background-repeat: no-repeat;
        }

        .mob-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.2);
        }
        
        .mob-btn.disabled {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        #btn-melee { bottom: 96px; right: 30px; background-position: 0% 0%; }
        #btn-left  { bottom: 30px; left: 30px; background-position: 100% 0%; }
        #btn-right { bottom: 30px; left: 96px; background-position: 0% 50%; }
        #btn-roll  { bottom: 30px; right: 96px; background-position: 100% 50%; }
        #btn-shoot { bottom: 30px; right: 30px; background-position: 0% 100%; }
        #btn-swap   { bottom: 96px; right: 96px; background-position: 100% 100%; }

        /* --- Orientation Warning Overlay --- */
        #orientation-warning {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100dvw; height: 100dvh;
            background-color: #111;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #orientation-warning h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        @media screen and (max-aspect-ratio: 1/1), screen and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
            #gameCanvas, #mobile-controls {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <h2>Please Rotate Your Device</h2>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls" style="display: none;">
        <div id="btn-left" class="mob-btn"></div>
        <div id="btn-right" class="mob-btn"></div>
        <div id="btn-shoot" class="mob-btn"></div>
        <div id="btn-roll" class="mob-btn"></div>
        <div id="btn-melee" class="mob-btn"></div>
        <div id="btn-swap" class="mob-btn"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // --- Web Audio API Setup ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        let walkSource = null;

        const audioDefaults = {
            walk: { volume: 0.5, rate: 1.0, loop: true },
            pickup: { volume: 1.0, rate: 0.8 },
            jump: { volume: 0.3, rate: 2.0 },
            roll: { volume: 0.6, rate: 1.0 },
            shot: { volume: 0.4, rate: 2.0 },
            laserShot: { volume: 0.2, rate: 1.0 },
            meleeHit: { volume: 0.2, rate: 3.0 },
            playerHurt: { volume: 0.4, rate: 3.0 },
            womanHurt: { volume: 0.4, rate: 3.0 },
            womanDeath: { volume: 0.7, rate: 2.0 },
            priestDeath: { volume: 0.7, rate: 2.0 },
            monkDeath: { volume: 0.7, rate: 1.0 },
            bearDeath: { volume: 1.0, rate: 2.0 },
            kfcDeath: { volume: 0.7, rate: 1.0 },
            armoredWomanHurt: { volume: 0.7, rate: 2.0 },
            armoredWomanDeath: { volume: 0.7, rate: 1.0 },
            downBoyDeath: { volume: 0.7, rate: 1.0 },
            toyCarDeath: { volume: 0.7, rate: 1.0 }
        };

        // --- Shared Constants & Magic Numbers ---
        const GAME_CFG = {
            CANVAS_W: 1366,
            CANVAS_H: 768,
            TIME_STEP: 16,
            GRAVITY: 1.4,
            FLOOR_OFFSET: 44,
            WORLD_SCALE: 0.62,
            ENEMY_SCALE: 0.135, 
            PLAYER_SCALE: 1.2,
            PLAYER_START_X: 150,
            PLAYER_START_Y: 500,
            PLAYER_SPEED: 8,
            PLAYER_JUMP_POWER: -35, 
            ROLL_SPEED: 30  
        };

        // --- Rendering Variables ---
        let renderScale = 1.0; 

        let gameState = 'LOADING'; 
        let currentScore = 0;
        let highestScore = localStorage.getItem('agentDosHighestScore') || 0;
        let enemiesKilled = 0;
        let floorY = 0;
        let frameTimeNow = 0;
        let musicStarted = false;

        // Game Over Variables
        let gameOverTimerMs = 0;
        let scoreAtDeath = 0;
        let highScoreAtDeath = 0;
        let isInterpolatingGameOver = false;

        let gameActiveTimeMs = 0;
        let pistolActiveTimeMs = 0;
        let difficultyIntervals = 0;
        let enemySizeMultiplier = 1.0;
        let enemyBonusHP = 1.0; 
        let enemyBonusArmor = 1.0; 
        let healthDropPenalty = 0.0;

        const world = { width: 0, height: 0 };
        const camera = { x: 0, y: 0 };

        const assets = { images: {}, audio: {} };
        const imageSources = {
            jumpImage: 'resources/player/player_jumping.webp', 
            accessories: 'resources/backgrounds/web_page_background.webp',
            background: 'resources/backgrounds/canvas_background.webp',
            pistol: 'resources/weapons/weapon_pistol.webp',
            uzi: 'resources/weapons/weapon_uzi.webp',
            laser: 'resources/weapons/weapon_laser.webp',
            walk: 'resources/player/player_walking_sprite_sheet.webp',
            idle: 'resources/player/player_idling_sprite_sheet.webp',
            aim: 'resources/player/player_shooting_pistol_sprite_sheet.webp',
            uziAim: 'resources/player/player_shooting_uzi_sprite_sheet.webp',
            laserAim: 'resources/player/player_shooting_laser_sprite_sheet.webp',
            roll: 'resources/player/dos_rolling.webp',
            melee: 'resources/player/player_melee_sprite_sheet.webp',
            health: 'resources/loot/loot_hp.webp',
            gameOver: 'resources/hud/game_over_image.webp',
            keyboardKey: 'resources/hud/keyboard_key.webp',
            bullet: 'resources/loot/loot_ammo.webp',
            star: 'resources/enemies/woman/woman_projectile.webp',
            cross: 'resources/enemies/priest/priest_projectile.webp',
            womanIdle: 'resources/enemies/woman/woman_attacking_sprite_sheet.webp',
            womanHurt: 'resources/enemies/woman/woman_hurt.webp',
            priestIdle: 'resources/enemies/priest/priest_attacking_sprite_sheet.webp',
            priestHurt: 'resources/enemies/priest/priest_hurt.webp',
            monkIdle: 'resources/enemies/monk/monk_idling_hurt_sprite_sheet.webp',
            bearIdle: 'resources/enemies/bear/bear_idling_sprite_sheet.webp',
            bearRun: 'resources/enemies/bear/bear_moving_sprite_sheet.webp',
            bearHurt: 'resources/enemies/bear/bear_hurt.webp',
            bearAttack: 'resources/enemies/bear/bear_attacking_sprite_sheet.webp',
            kfcRun: 'resources/enemies/kfc/kfc_moving_sprite_sheet.webp',
            kfcHurt: 'resources/enemies/kfc/kfc_hurt.webp',
            armoredWoman: 'resources/enemies/armored_woman/armored_woman_sprite_sheet.webp',
            snowParticle: 'resources/enemies/armored_woman/armored_woman_projectile.webp',
            downBoy: 'resources/enemies/down_boy/down_boy_sprite_sheet.webp',
            toyCar: 'resources/enemies/down_boy/toy_car_sprite_sheet.webp'
        };
        const audioSources = {
            bgMusic: 'resources/sounds/background_music.mp3',
            walk: 'resources/sounds/player_walking_sound_effect.mp3',
            pickup: 'resources/sounds/item_picked_up.mp3',
            jump: 'resources/sounds/player_jumping_sound_effect.mp3',
            roll: 'resources/sounds/player_rolling_sound_effect.mp3',
            shot: 'resources/sounds/shot_sound.mp3',
            laserShot: 'resources/sounds/laser_sound.mp3',
            meleeHit: 'resources/sounds/player_melee_sound_effect.mp3',
            playerHurt: 'resources/sounds/player_hurt_sound_effect.mp3',
            womanHurt: 'resources/sounds/woman_hurt_sound_effect.mp3',
            womanDeath: 'resources/sounds/woman_death_sound_effect.mp3',
            priestDeath: 'resources/sounds/priest_death_sound_effect.mp3',
            monkDeath: 'resources/sounds/monk_death_sound_effect.mp3',
            bearDeath: 'resources/sounds/bear_death_sound_effect.mp3',
            kfcDeath: 'resources/sounds/kfc_death_sound_effect.mp3',
            armoredWomanHurt: 'resources/sounds/armored_woman_hurt_sound_effect.mp3',
            armoredWomanDeath: 'resources/sounds/armor_woman_death_sound_effect.mp3',
            downBoyDeath: 'resources/sounds/down_boy_death_sound_effect.mp3',
            toyCarDeath: 'resources/sounds/toy_car_death_sound_effect.mp3'
        };

        let loadProgress = 0;
        let totalAssets = Object.keys(imageSources).length + Object.keys(audioSources).length;
        let loadedAssets = 0;

        function loadAsset(type, key, src) {
            return new Promise(async (resolve, reject) => {
                if (type === 'image') {
                    try {
                        const response = await fetch(src);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const blob = await response.blob();
                        
                        // Decodes the image off the main thread and makes it GPU-ready
                        const bitmap = await createImageBitmap(blob);
                        assets.images[key] = bitmap;
                        
                        loadedAssets++;
                        resolve();
                    } catch (e) {
                        console.warn(`Failed to load or decode ${src}`, e);
                        loadedAssets++; // Resolve anyway to prevent hanging the load screen
                        resolve();
                    }
                } else {
                    if (key === 'bgMusic') {
                        const aud = new Audio();
                        aud.oncanplaythrough = () => { loadedAssets++; resolve(); };
                        aud.onerror = () => { console.warn(`Failed to load ${src}`); resolve(); };
                        aud.src = src;
                        assets.audio[key] = aud;
                    } else {
                        try {
                            const response = await fetch(src);
                            const arrayBuffer = await response.arrayBuffer();
                            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                            assets.audio[key] = audioBuffer;
                            loadedAssets++;
                            resolve();
                        } catch (e) {
                            console.warn(`Failed to load Web Audio ${src}`, e);
                            loadedAssets++;
                            resolve();
                        }
                    }
                }
            });
        }

        function playSound(key, customRate = null) {
            if (!musicStarted || !assets.audio[key]) return null;

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const buffer = assets.audio[key];
            if (!(buffer instanceof AudioBuffer)) return null; 

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            const gainNode = audioCtx.createGain();
            const config = audioDefaults[key] || { volume: 1.0, rate: 1.0, loop: false };
            
            gainNode.gain.value = config.volume;
            source.playbackRate.value = customRate !== null ? customRate : config.rate;
            source.loop = config.loop || false;

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);

            return source; 
        }

        async function preloadGame() {
            await loadAsset('image', 'jumpImage', imageSources.jumpImage);
            
            const promises = [];
            for (const [key, src] of Object.entries(imageSources)) {
                if (key !== 'jumpImage') promises.push(loadAsset('image', key, src));
            }
            for (const [key, src] of Object.entries(audioSources)) {
                promises.push(loadAsset('audio', key, src));
            }

            await Promise.all(promises);
            initializeGameObjects();
            gameState = 'LOADING_DONE_WAITING';
        }

        const player = {
            x: 0, y: 0,
            speed: 0, hp: 5,
            mana: 100, maxMana: 100,
            isBlinking: false, blinkTimer: 0,
            currentWeapon: 'pistol', vx: 0, vy: 0,
            gravity: 0, jumpPower: 0,
            isGrounded: false, width: 0, height: 0, scale: 0.26 * GAME_CFG.PLAYER_SCALE,
            aimScale: 0.395 * GAME_CFG.PLAYER_SCALE, jumpScale: 0.286 * GAME_CFG.PLAYER_SCALE,
            
            walkCols: 6, walkRows: 6, walkTotalFrames: 36,
            idleCols: 5, idleRows: 8, idleTotalFrames: 40,
            aimCols: 2, aimRows: 1, aimTotalFrames: 2,
            uziAimCols: 2, uziAimRows: 1, uziAimTotalFrames: 2,
            laserAimCols: 2, laserAimRows: 1, laserAimTotalFrames: 2,
            jumpCols: 1, jumpRows: 1, jumpTotalFrames: 1,
            meleeCols: 8, meleeRows: 9, meleeTotalFrames: 72,

            isRolling: false, rollDistanceLeft: 0, rollSpeed: 0,
            rollDirection: 1, rollRotation: 0, hitEnemiesThisRoll: [], 
            
            isMeleeing: false, hitEnemiesThisMeleeFrame: [], meleeMoveTimer: 0,
            
            currentState: 'idle', currentFrame: 0, frameTimer: 0, defaultFrameInterval: 30, facingLeft: false,
            isShooting: false, shootTimer: 0,
            slowStack: 0
        };

        const pistol = { x: 0, y: 0, width: 0, height: 0, pickedUp: false, floatY: 0, floatSpeed: 0.005, floatAmplitude: 0, sizeRatio: 0.60, ammo: 0, maxAmmo: 30 };
        const uzi = { x: 0, y: 0, width: 0, height: 0, dropped: false, pickedUp: false, floatY: 0, floatSpeed: 0.005, floatAmplitude: 0, sizeRatio: 0.48, vx: 0, vy: 0, ammo: 0, maxAmmo: 50 };
        const laserWep = { x: 0, y: 0, width: 0, height: 0, dropped: false, pickedUp: false, floatY: 0, floatSpeed: 0.005, floatAmplitude: 0, sizeRatio: 0.60, vx: 0, vy: 0, ammo: 0, maxAmmo: 40 };

        let bullets = [], activeLasers = [], ammoPickups = [], healthPickups = [], throwingStars = [], crosses = [], enemies = [], rainbowHearts = [];
        let bulletWidth = 0, bulletHeight = 0, starWidth = 0, starHeight = 0, crossWidth = 0, crossHeight = 0;
        let baseSizes = { woman: {w:0,h:0}, priest: {w:0,h:0}, monk: {w:0,h:0}, bear: {w:0,h:0}, kfc: {w:0,h:0}, armoredWoman: {w:0,h:0}, downBoy: {w:0,h:0}, toyCar: {w:0,h:0} };
        
        let nextSpawnTargetMs;
        let currentSpawnIntervalMs;

        // --- Helper Function for Full Screen & Orientation ---
        function tryEnterFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const fullscreenElement = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement;
            
            if (!fullscreenElement && requestFullScreen) {
                requestFullScreen.call(docEl).then(() => {
                    // Once fullscreen is active, attempt to lock the screen horizontally
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function(error) {
                            console.warn('Orientation lock failed:', error);
                        });
                    }
                }).catch(err => {
                    console.warn(`Error attempting to enable fullscreen: ${err.message}`);
                });
            }
        }

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false, k: false, p: false, '1': false, '2': false, '3': false };
        const mobileKeys = { left: false, right: false, shoot: false, roll: false, melee: false, swap: false };
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        let cachedButtonCenters = [];

        function updateButtonCenters() {
            cachedButtonCenters = [];
            const addCenter = (id, key) => {
                const el = document.getElementById(id);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0) {
                        cachedButtonCenters.push({ key, x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
                    }
                }
            };
            addCenter('btn-left', 'left');
            addCenter('btn-right', 'right');
            addCenter('btn-shoot', 'shoot');
            addCenter('btn-roll', 'roll');
            addCenter('btn-melee', 'melee');
            addCenter('btn-swap', 'swap');
            cachedButtonCenters.push({ key: 'ammo', x: window.innerWidth - 80, y: 80 }); 
        }

        if (isMobile) {
            document.body.classList.add('is-mobile'); // Assign CSS class for mobile overrides
            let handledSwapTouches = new Set();

            const processTouches = (e) => {
                if (e.type === 'touchend') {
                    tryEnterFullscreen();
                }

                // CRITICAL FIX: Block all touches while on the GAMEOVER screen
                if (gameState === 'GAMEOVER') {
                    if (!isInterpolatingGameOver && e.type === 'touchend') {
                        resetGame();
                    }
                    return; // Prevent touchstart/move from setting mobile keys
                }

                if (gameState === 'TAP_TO_START') {
                    if (e.type === 'touchend') {
                        gameState = 'PLAYING';
                    }
                    return; 
                }

                mobileKeys.left = false;
                mobileKeys.right = false;
                mobileKeys.shoot = false;
                mobileKeys.roll = false;
                mobileKeys.melee = false;
                mobileKeys.swap = false;

                const currentTouches = new Set();

                for (let i = 0; i < e.touches.length; i++) {
                    const t = e.touches[i];
                    currentTouches.add(t.identifier);
                    let closestKey = null;
                    let minDist = 300;

                    for (const c of cachedButtonCenters) {
                        const dist = Math.hypot(t.clientX - c.x, t.clientY - c.y);
                        if (dist < minDist) {
                            minDist = dist;
                            closestKey = c.key;
                        }
                    }

                    if (closestKey) {
                        if (closestKey === 'ammo' || closestKey === 'swap') {
                            mobileKeys.swap = true;
                            if (!handledSwapTouches.has(t.identifier)) {
                                handledSwapTouches.add(t.identifier);
                                let availableWeapons = [];
                                if (pistol.pickedUp) availableWeapons.push('pistol');
                                if (uzi.pickedUp) availableWeapons.push('uzi');
                                if (laserWep.pickedUp) availableWeapons.push('laser');
                                
                                if (availableWeapons.length > 1) {
                                    let idx = availableWeapons.indexOf(player.currentWeapon);
                                    player.currentWeapon = availableWeapons[(idx + 1) % availableWeapons.length];
                                }
                            }
                        } else {
                            mobileKeys[closestKey] = true;
                        }
                    }
                }

                for (const id of handledSwapTouches) {
                    if (!currentTouches.has(id)) {
                        handledSwapTouches.delete(id);
                    }
                }
            };

            const options = { passive: false };
            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') e.preventDefault();
                processTouches(e);
            }, options);

            document.addEventListener('touchmove', (e) => { e.preventDefault(); processTouches(e); }, options);
            document.addEventListener('touchend', (e) => { e.preventDefault(); processTouches(e); }, options);
            document.addEventListener('touchcancel', (e) => { e.preventDefault(); processTouches(e); }, options);
        }

        window.addEventListener('keydown', (e) => {
            if (gameState === 'TAP_TO_START') {
                tryEnterFullscreen();
                gameState = 'PLAYING';
            }

            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        window.addEventListener('mousedown', (e) => {
            if (gameState === 'TAP_TO_START') {
                tryEnterFullscreen();
                gameState = 'PLAYING';
            }
        });

        function pauseAllAudio() {
            if (assets.audio.bgMusic && typeof assets.audio.bgMusic.pause === 'function') {
                assets.audio.bgMusic.pause();
            }
            if (walkSource) {
                walkSource.stop();
                walkSource = null;
            }
            audioCtx.suspend();
        }

        function initializeGameObjects() {
            // Keep background music streaming via Audio Element
            if (assets.audio.bgMusic) {
                assets.audio.bgMusic.loop = true; 
                assets.audio.bgMusic.volume = 0.1;
            }

            // Absolute Physical/Logical Setup
            player.speed = GAME_CFG.PLAYER_SPEED * GAME_CFG.WORLD_SCALE;
            player.gravity = GAME_CFG.GRAVITY * GAME_CFG.WORLD_SCALE;
            player.jumpPower = GAME_CFG.PLAYER_JUMP_POWER * GAME_CFG.WORLD_SCALE;
            player.rollSpeed = GAME_CFG.ROLL_SPEED * GAME_CFG.WORLD_SCALE;

            pistol.floatAmplitude = 15 * GAME_CFG.WORLD_SCALE;
            uzi.floatAmplitude = 15 * GAME_CFG.WORLD_SCALE;
            laserWep.floatAmplitude = 15 * GAME_CFG.WORLD_SCALE;

            player.width = (assets.images.walk.width / player.walkCols) * player.scale * GAME_CFG.WORLD_SCALE;
            player.height = (assets.images.walk.height / player.walkRows) * player.scale * GAME_CFG.WORLD_SCALE;
            
            bulletWidth = assets.images.bullet.width * 0.037 * GAME_CFG.WORLD_SCALE;
            bulletHeight = assets.images.bullet.height * 0.037 * GAME_CFG.WORLD_SCALE;
            starWidth = assets.images.star.width * 0.169 * GAME_CFG.WORLD_SCALE;
            starHeight = assets.images.star.height * 0.169 * GAME_CFG.WORLD_SCALE;
            crossWidth = assets.images.cross.width * 0.169 * GAME_CFG.WORLD_SCALE;
            crossHeight = assets.images.cross.height * 0.169 * GAME_CFG.WORLD_SCALE;

            baseSizes.woman.w = (assets.images.womanIdle.width / 3) * GAME_CFG.ENEMY_SCALE * 2.13 * GAME_CFG.WORLD_SCALE;
            baseSizes.woman.h = assets.images.womanIdle.height * GAME_CFG.ENEMY_SCALE * 2.13 * GAME_CFG.WORLD_SCALE;
            baseSizes.priest.w = (assets.images.priestIdle.width / 3) * GAME_CFG.ENEMY_SCALE * 2.13 * GAME_CFG.WORLD_SCALE;
            baseSizes.priest.h = assets.images.priestIdle.height * GAME_CFG.ENEMY_SCALE * 2.13 * GAME_CFG.WORLD_SCALE;
            baseSizes.monk.w = (assets.images.monkIdle.width / 3) * (GAME_CFG.ENEMY_SCALE * 2.77) * GAME_CFG.WORLD_SCALE;
            baseSizes.monk.h = assets.images.monkIdle.height * (GAME_CFG.ENEMY_SCALE * 2.77) * GAME_CFG.WORLD_SCALE;
            baseSizes.bear.w = (assets.images.bearRun.width / 3) * (GAME_CFG.ENEMY_SCALE * 2.218) * GAME_CFG.WORLD_SCALE;
            baseSizes.bear.h = (assets.images.bearRun.height / 7) * (GAME_CFG.ENEMY_SCALE * 2.218) * GAME_CFG.WORLD_SCALE;
            baseSizes.kfc.w = (assets.images.kfcRun.width / 6) * (GAME_CFG.ENEMY_SCALE * 2.27) * GAME_CFG.WORLD_SCALE;
            baseSizes.kfc.h = (assets.images.kfcRun.height / 7) * (GAME_CFG.ENEMY_SCALE * 2.27) * GAME_CFG.WORLD_SCALE;
            
            baseSizes.armoredWoman.w = assets.images.armoredWoman.width * (GAME_CFG.ENEMY_SCALE * 2.46) * GAME_CFG.WORLD_SCALE;
            baseSizes.armoredWoman.h = (assets.images.armoredWoman.height / 5) * (GAME_CFG.ENEMY_SCALE * 2.46) * GAME_CFG.WORLD_SCALE;

            baseSizes.downBoy.w = assets.images.downBoy.width * GAME_CFG.ENEMY_SCALE * 2.47 * GAME_CFG.WORLD_SCALE;
            baseSizes.downBoy.h = (assets.images.downBoy.height / 5) * GAME_CFG.ENEMY_SCALE * 2.47 * GAME_CFG.WORLD_SCALE;
            baseSizes.toyCar.w = (assets.images.toyCar.width / 2) * GAME_CFG.ENEMY_SCALE * 3 * GAME_CFG.WORLD_SCALE;
            baseSizes.toyCar.h = (assets.images.toyCar.height / 3) * GAME_CFG.ENEMY_SCALE * 3 * GAME_CFG.WORLD_SCALE;

            world.width = assets.images.background.width * GAME_CFG.WORLD_SCALE;
            world.height = assets.images.background.height * GAME_CFG.WORLD_SCALE;
            floorY = world.height - (GAME_CFG.FLOOR_OFFSET * GAME_CFG.WORLD_SCALE);

            const scaledWidth = assets.images.accessories.width * 0.2;
            document.body.style.setProperty('--bg-size', `${scaledWidth}px auto`);

            updateWeaponSizes();
            resizeCanvas(); 
            resetGame();
        }

        function updateWeaponSizes() {
            if(player.height > 0) {
                const pTarget = player.height * pistol.sizeRatio;
                pistol.height = pTarget;
                pistol.width = pTarget * (assets.images.pistol.width / assets.images.pistol.height);
                
                const uTarget = player.height * uzi.sizeRatio;
                uzi.height = uTarget;
                uzi.width = uTarget * (assets.images.uzi.width / assets.images.uzi.height);
                
                if (assets.images.laser && assets.images.laser.width > 0) {
                    const lTarget = player.height * laserWep.sizeRatio;
                    laserWep.height = lTarget;
                    laserWep.width = lTarget * (assets.images.laser.width / assets.images.laser.height);
                }
            }
        }

        function spawnEnemy(type, startX, owner) {
            const base = baseSizes[type];
            let scaledW = (base.w || 100) * enemySizeMultiplier;
            let scaledH = base.h * enemySizeMultiplier;
            
            let spawnX;
            if (startX !== undefined) {
                spawnX = startX;
            } else {
                let valid = false;
                let attempts = 0;
                while (!valid && attempts < 50) {
                    spawnX = Math.random() * (world.width - scaledW);
                    if (Math.abs(spawnX - player.x) >= 400 * GAME_CFG.WORLD_SCALE) {
                        valid = true;
                    }
                    attempts++;
                }
                if (!valid) {
                    spawnX = player.x > world.width / 2 ? 0 : world.width - scaledW;
                }
            }

            const yPos = type === 'priest' ? 580 * GAME_CFG.WORLD_SCALE : 600 * GAME_CFG.WORLD_SCALE;
            
            let baseHp = 80; 
            if (type === 'woman') baseHp = 25;
            else if (type === 'priest') baseHp = 35;
            else if (type === 'monk') baseHp = 90;
            else if (type === 'bear') baseHp = 55;
            else if (type === 'kfc') baseHp = 65;
            else if (type === 'armoredWoman') baseHp = 25;
            else if (type === 'downBoy') baseHp = 65;
            else if (type === 'toyCar') baseHp = 1;

            const finalHp = Math.floor(baseHp * enemyBonusHP);
            const currentLevel = 1 + difficultyIntervals;
            const armor = type === 'armoredWoman' ? Math.floor(5 * enemyBonusArmor) : (type === 'toyCar' ? 2 : 0);
            
            let frameDurs = [];
            let r = 1, tFrames = 3, c = 3;
            if(type === 'woman') frameDurs = [1500, 500, 400];
            else if(type === 'priest') frameDurs = [1500, 1000, 700];
            else if(type === 'monk') { frameDurs = [1100, 300]; tFrames = 2; }
            else if(type === 'bear') { r = 7; tFrames = 21; }
            else if(type === 'kfc') { r = 7; c = 6; tFrames = 42; frameDurs = new Array(42).fill(15); }
            else if(type === 'armoredWoman') { frameDurs = [1000, 300, 800, 1500]; r = 5; c = 1; tFrames = 4; }
            else if(type === 'downBoy') { frameDurs = [1000, 300, 1000, 1000, 300]; r = 5; c = 1; tFrames = 5; }
            else if(type === 'toyCar') { frameDurs = [30, 30, 30, 30, 30, 30]; r = 3; c = 2; tFrames = 6; }

            let newEnemy = {
                type, x: spawnX, y: yPos, vx: 0, vy: 0, width: scaledW, height: scaledH, hp: type === 'toyCar' ? 1 : finalHp, maxHp: finalHp, level: currentLevel, isDead: false,
                armor: armor, maxArmor: armor, exploded: false,
                currentState: 'idle', stateTimer: 3000, hurtTimer: 0, cols: c, rows: r, totalFrames: tFrames,
                currentFrame: 0, frameTimer: 0, frameDurations: frameDurs, facingLeft: true, isBlinking: false, blinkTimer: 0,
                attackLoopCount: 0, isTicking: false, tickingTimer: 0
            };

            if (type === 'downBoy') {
                newEnemy.dbPhase = 0;
                newEnemy. associatedCar = null;
            } else if (type === 'toyCar') {
                newEnemy.owner = owner;
                newEnemy.distanceTraveled = 0;
                if (owner) {
                    newEnemy.facingLeft = owner.facingLeft;
                    owner.associatedCar = newEnemy;
                }
            }

            enemies.push(newEnemy);
        }

        function applyEnemyDamage(w, incomingDmg, isMelee = false) {
            if (w.type === 'toyCar') {
                if (isMelee) return;
                w.armor -= 1; 
                if (w.armor <= 0) {
                    w.hp = 0;
                    w.armor = 0;
                }
                currentScore += incomingDmg;
                w.isBlinking = true;
                w.blinkTimer = 80;
                return;
            }

            if (w.armor !== undefined && w.armor > 0) {
                if (isMelee) return; 
                let effectiveDmg = Math.max(1, incomingDmg - 9); 
                if (w.armor >= effectiveDmg) {
                    w.armor -= effectiveDmg;
                } else {
                    let remainder = effectiveDmg - w.armor;
                    w.armor = 0;
                    w.hp -= remainder;
                }
            } else {
                w.hp -= incomingDmg;
            }
            currentScore += incomingDmg;
        }

        function handleEnemyDeath(w) {
            w.isDead = true; enemiesKilled++;
            w.vy = -10 * GAME_CFG.WORLD_SCALE; w.vx = w.facingLeft ? 2 * GAME_CFG.WORLD_SCALE : -2 * GAME_CFG.WORLD_SCALE; w.rotation = 0;
            w.targetRotation = (Math.random() > 0.5 ? 1 : -1) * (35 * Math.PI / 180);
            w.rotationSpeed = w.targetRotation / 45; 

            if (w.type === 'downBoy' && w.associatedCar && !w.associatedCar.isDead) {
                w.associatedCar.hp = 0;
                w.associatedCar.armor = 0;
                handleEnemyDeath(w.associatedCar);
            }

            // --- Check if within world boundaries [0, world.width] ---
            const enemyCenterX = w.x + w.width / 2;
            const isInsideWorld = enemyCenterX >= 0 && enemyCenterX <= world.width;

            if (isInsideWorld) {
                // Play sound only if within dimensions
                playSound(w.type + 'Death');

                // Weapon Unlocks
                if (enemiesKilled >= 30 && !laserWep.dropped) {
                    laserWep.dropped = true; updateWeaponSizes();
                    laserWep.x = w.x + (w.width / 2) - (laserWep.width / 2);
                    laserWep.y = w.y + (w.height / 2) - (laserWep.height / 2);
                    laserWep.vx = (Math.random() - 0.5) * 8 * GAME_CFG.WORLD_SCALE; laserWep.vy = (-8 - Math.random() * 6) * GAME_CFG.WORLD_SCALE;
                }

                if (enemiesKilled >= 15 && !uzi.dropped) {
                    uzi.dropped = true; updateWeaponSizes(); 
                    uzi.x = w.x + (w.width / 2) - (uzi.width / 2);
                    uzi.y = w.y + (w.height / 2) - (uzi.height / 2); 
                    uzi.vx = (Math.random() - 0.5) * 8 * GAME_CFG.WORLD_SCALE; uzi.vy = (-8 - Math.random() * 6) * GAME_CFG.WORLD_SCALE; 
                }

                if (!w.exploded) {
                    const pickupW = bulletWidth * 2.25;
                    const pickupH = bulletHeight * 2.25;

                    let curWep = player.currentWeapon === 'uzi' ? uzi : player.currentWeapon === 'laser' ? laserWep : pistol;
                    let ammoDropChance = Math.min(curWep.ammo < 15 ? 0.70 : 0.20, ammoPickups.length > 0 ? 0.40 : 1.0);
                    
                    if (Math.random() <= ammoDropChance) {
                        ammoPickups.push({ x: w.x + (w.width / 2) - (pickupW / 2), y: w.y + (w.height / 2) - (pickupH / 2), vx: (Math.random() - 0.5) * 16 * GAME_CFG.WORLD_SCALE, vy: (-8 - Math.random() * 6) * GAME_CFG.WORLD_SCALE, floatY: 0 });
                    }

                    let hpDropChance;
                    switch (true) {
                        case (player.hp <= 1): hpDropChance = 0.50; break;
                        case (player.hp === 2): hpDropChance = 0.40; break;
                        case (player.hp === 3): hpDropChance = 0.30; break;
                        case (player.hp === 4): hpDropChance = 0.20; break;
                        default: hpDropChance = 0;
                    }
                    
                    hpDropChance = Math.max(0, hpDropChance - healthDropPenalty);

                    if (Math.random() <= hpDropChance) {
                        const hw = assets.images.health.width * 0.078 * GAME_CFG.WORLD_SCALE, hh = assets.images.health.height * 0.078 * GAME_CFG.WORLD_SCALE;
                        healthPickups.push({ x: w.x + (w.width / 2) - (hw / 2), y: w.y + (w.height / 2) - (hh / 2), vx: (Math.random() - 0.5) * 16 * GAME_CFG.WORLD_SCALE, vy: (-8 - Math.random() * 6) * GAME_CFG.WORLD_SCALE, floatY: 0 });
                    }
                }
            }
        }

        function resetGame() {
            player.hp = 5; 
            player.x = GAME_CFG.PLAYER_START_X * GAME_CFG.WORLD_SCALE; 
            player.y = GAME_CFG.PLAYER_START_Y * GAME_CFG.WORLD_SCALE;
            player.vx = 0; player.vy = 0; player.isBlinking = false; player.blinkTimer = 0;
            player.mana = 100;
            player.isShooting = false; player.shootTimer = 0; player.currentState = 'idle';
            player.currentFrame = 0; player.frameTimer = 0; player.currentWeapon = 'pistol';
            player.isRolling = false; player.rollDistanceLeft = 0; player.hitEnemiesThisRoll = [];
            player.rollRotation = 0; 
            player.isMeleeing = false; player.hitEnemiesThisMeleeFrame = []; player.meleeMoveTimer = 0;
            player.slowStack = 0;
            
            pistol.pickedUp = false; pistol.ammo = 0; pistol.x = 600 * GAME_CFG.WORLD_SCALE; pistol.y = 855 * GAME_CFG.WORLD_SCALE;
            uzi.pickedUp = false; uzi.dropped = false; uzi.ammo = 0; uzi.vx = 0; uzi.vy = 0;
            laserWep.pickedUp = false; laserWep.dropped = false; laserWep.ammo = 0; laserWep.vx = 0; laserWep.vy = 0;
            
            enemiesKilled = 0; currentScore = 0; gameState = 'PLAYING';
            
            gameActiveTimeMs = 0;
            pistolActiveTimeMs = 0;
            difficultyIntervals = 0;
            enemySizeMultiplier = 1.0;
            enemyBonusHP = 1.0;
            enemyBonusArmor = 1.0;
            healthDropPenalty = 0.0;

            bullets = []; activeLasers = []; ammoPickups = []; healthPickups = []; throwingStars = []; crosses = []; rainbowHearts = []; enemies.length = 0; 

            nextSpawnTargetMs = 3000;
            currentSpawnIntervalMs = 2500;

            // CRITICAL FIX: Reset ALL input states explicitly, not just PC keys.
            for (let k in keys) keys[k] = false;
            for (let k in mobileKeys) mobileKeys[k] = false;

            musicStarted = false;
            if (assets.audio.bgMusic && typeof assets.audio.bgMusic.pause === 'function') {
                assets.audio.bgMusic.pause();
                assets.audio.bgMusic.currentTime = 0;
            } 
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (walkSource) {
                walkSource.stop();
                walkSource = null;
            }
        }

        function update() {
            if (gameState === 'GAMEOVER') {
                if (isInterpolatingGameOver) {
                    gameOverTimerMs += GAME_CFG.TIME_STEP;
                    if (gameOverTimerMs >= 1000) {
                        isInterpolatingGameOver = false;
                    }
                } else {
                    if (keys.p) resetGame();
                }
                return; 
            }

            if (player.hp <= 0) {
                gameState = 'GAMEOVER';
                pauseAllAudio();
                
                gameOverTimerMs = 0;
                scoreAtDeath = currentScore;
                highScoreAtDeath = highestScore;
                isInterpolatingGameOver = true;

                if (currentScore > highestScore) {
                    highestScore = currentScore;
                    localStorage.setItem('agentDosHighestScore', highestScore);
                }

                return;
            }

            frameTimeNow = Date.now();

            gameActiveTimeMs += GAME_CFG.TIME_STEP;
            const newIntervals = Math.floor(pistolActiveTimeMs / 30000);
            if (newIntervals > difficultyIntervals) {
                difficultyIntervals = newIntervals;
                // enemySizeMultiplier *= 1.03;
                enemyBonusHP *= 1.03; 
                enemyBonusArmor *= 1.03;
                healthDropPenalty += 0.01;
            }

            if (pistol.pickedUp) {
                pistolActiveTimeMs += GAME_CFG.TIME_STEP;
            }

            if (isMobile) {
                let weaponsCount = 0;
                if (pistol.pickedUp) weaponsCount++;
                if (uzi.pickedUp) weaponsCount++;
                if (laserWep.pickedUp) weaponsCount++;

                const swapBtn = document.getElementById('btn-swap');
                if (swapBtn) {
                    if (weaponsCount < 2) {
                        swapBtn.classList.add('disabled');
                    } else {
                        swapBtn.classList.remove('disabled');
                    }
                }
            }

            player.slowStack = 0;
            for (let j = 0; j < enemies.length; j++) {
                let w = enemies[j];
                if (w.type === 'armoredWoman' && !w.isDead && (w.currentFrame === 3) && w.currentState !== 'hurt') {
                    player.slowStack++;
                }
            }

            let slowMult = Math.pow(0.85, player.slowStack);
            let effSpeed = player.speed * slowMult;

            const pxCenter = player.x + player.width / 2;
            const pyCenter = player.y + player.height / 2;
            const pRightEdge = player.x + player.width;
            const pHitXCenter = player.x + 50 * GAME_CFG.WORLD_SCALE;
            const pHitYCenter = player.y + 50 * GAME_CFG.WORLD_SCALE;
            const pHitWCenter = player.width - 100 * GAME_CFG.WORLD_SCALE;
            const pHitHCenter = player.height - 100 * GAME_CFG.WORLD_SCALE;

            if (keys['1'] && pistol.pickedUp) player.currentWeapon = 'pistol';
            if (keys['2'] && uzi.pickedUp) player.currentWeapon = 'uzi';
            if (keys['3'] && laserWep.pickedUp) player.currentWeapon = 'laser';

            let isMoving = false;

            // --- Regenerate Mana ---
            player.mana = Math.min(player.maxMana, player.mana + 20 * (GAME_CFG.TIME_STEP / 1000));

            if (player.isBlinking) { player.blinkTimer -= GAME_CFG.TIME_STEP; if (player.blinkTimer <= 0) player.isBlinking = false; }
            if (player.isShooting) { player.shootTimer -= GAME_CFG.TIME_STEP; if (player.shootTimer <= 0) player.isShooting = false; }

            let activeWeapon = player.currentWeapon === 'uzi' ? uzi : player.currentWeapon === 'laser' ? laserWep : pistol;

            // --- INTENT EVALUATION FOR BOTH PC & MOBILE ---
            const intentLeft = keys.a || mobileKeys.left;
            const intentRight = keys.d || mobileKeys.right;
            const intentJump = keys.w;
            const intentRoll = (keys.k && (keys.a || keys.d)) || mobileKeys.roll;
            const intentMelee = (keys.k && keys.s) || mobileKeys.melee;
            const intentShoot = (keys.k && !keys.s && !(keys.a || keys.d)) || mobileKeys.shoot;

            if (intentRoll && player.isGrounded && !player.isRolling && player.mana >= 20) {
                player.mana -= 20;
                player.isRolling = true; player.rollDistanceLeft = 550 * GAME_CFG.WORLD_SCALE; 
                player.rollDirection = player.facingLeft ? -1 : 1;
                player.hitEnemiesThisRoll = []; player.rollRotation = 0; 
                player.isMeleeing = false; 

                playSound('roll');
            }
            else if (intentMelee && player.isGrounded && !player.isRolling) {
                player.isMeleeing = true;
                player.isShooting = false;
            }
            else if (intentShoot && !player.isShooting && !player.isRolling && player.isGrounded && activeWeapon.pickedUp && (player.currentWeapon === 'laser' ? player.mana >= 6 : activeWeapon.ammo > 0)) {
                player.isShooting = true;
                player.shootTimer = player.currentWeapon === 'uzi' ? 100 : player.currentWeapon === 'laser' ? 150 : 200; 
                if (player.slowStack > 0) player.shootTimer = Math.floor(player.shootTimer / slowMult);
                
                if (player.currentWeapon === 'laser') {
                    player.mana -= 6;
                } else {
                    activeWeapon.ammo -= 1;
                }
                
                player.currentFrame = 0; player.frameTimer = 0;
                player.isMeleeing = false;

                if (player.currentWeapon === 'laser') {
                    let startX = player.facingLeft ? player.x - 50 * GAME_CFG.WORLD_SCALE : pRightEdge + 50 * GAME_CFG.WORLD_SCALE;
                    let startY = pyCenter - 53 * GAME_CFG.WORLD_SCALE;
                    let dir = player.facingLeft ? -1 : 1;

                    let hits = [];
                    for (let j = 0; j < enemies.length; j++) {
                        let w = enemies[j];
                        if (w.isDead || w.width <= 0) continue;
                        
                        let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                        if (w.type === 'monk') { hOffX = hOffX * 1.3 - 30 * GAME_CFG.WORLD_SCALE; hOffY = hOffY * 1.3 + 50 * GAME_CFG.WORLD_SCALE; hRedW = hRedW * 1.3 - 60 * GAME_CFG.WORLD_SCALE; hRedH = hRedH * 1.3 + 100 * GAME_CFG.WORLD_SCALE; }
                        else if (w.type === 'bear') { hOffX = 20 * GAME_CFG.WORLD_SCALE; hOffY = 20 * GAME_CFG.WORLD_SCALE; hRedW = 40 * GAME_CFG.WORLD_SCALE; hRedH = 40 * GAME_CFG.WORLD_SCALE; }
                        else if (w.type === 'toyCar') { hOffX = 5 * GAME_CFG.WORLD_SCALE; hOffY = 5 * GAME_CFG.WORLD_SCALE; hRedW = 10 * GAME_CFG.WORLD_SCALE; hRedH = 10 * GAME_CFG.WORLD_SCALE; }
                        const scaleRatio = w.height / baseSizes[w.type].h;
                        hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;
                        const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                        if (startY >= wHitY && startY <= wHitY + wHitH) {
                            if ((dir === 1 && wHitX + wHitW >= startX) || (dir === -1 && wHitX <= startX)) {
                                let hitDist = 0;
                                if (dir === 1 && wHitX > startX) {
                                    hitDist = wHitX - startX;
                                } else if (dir === -1 && wHitX + wHitW < startX) {
                                    hitDist = startX - (wHitX + wHitW);
                                }
                                hits.push({ enemy: w, dist: hitDist });
                            }
                        }
                    }

                    hits.sort((a, b) => a.dist - b.dist);
                    let hitCount = 0;
                    
                    let logicalViewW = canvas.width / (renderScale || 1);
                    let screenEnd = dir === 1 ? Math.min(world.width, camera.x + logicalViewW) : Math.max(0, camera.x);
                    let endX = screenEnd;

                    for (let i = 0; i < hits.length && hitCount < 5; i++) {
                        let w = hits[i].enemy;
                        applyEnemyDamage(w, 3);
                        w.vx = dir * 1.5 * GAME_CFG.WORLD_SCALE; w.vy = -2 * GAME_CFG.WORLD_SCALE;
                        
                        if (w.hp <= 0) handleEnemyDeath(w);
                        else {
                            if (!w.isTicking) { w.currentState = 'hurt'; w.hurtTimer = 150; w.isBlinking = true; w.blinkTimer = 80; }
                            if (w.armor > 0) { playSound('armoredWomanHurt'); } else { playSound('womanHurt'); }
                        }
                        hitCount++;
                        if (hitCount === 5) {
                            endX = dir === 1 ? w.x + w.width / 2 : w.x + w.width / 2;
                        }
                    }

                    activeLasers.push({ startX, startY, endX, dir, life: 100 });
                    playSound('laserShot');
                } else {
                    bullets.push({
                        x: player.facingLeft ? player.x - bulletWidth + 25 * GAME_CFG.WORLD_SCALE: pRightEdge - 25 * GAME_CFG.WORLD_SCALE,
                        y: pyCenter - (bulletHeight / 2) - 43 * GAME_CFG.WORLD_SCALE,
                        vx: player.facingLeft ? -60 * GAME_CFG.WORLD_SCALE : 60 * GAME_CFG.WORLD_SCALE, 
                        vy: (Math.random() - 0.5) * (player.currentWeapon === 'uzi' ? 24 * GAME_CFG.WORLD_SCALE : 12 * GAME_CFG.WORLD_SCALE),
                        damage: player.currentWeapon === 'uzi' ? 7 : 10 
                    });

                    playSound('shot', player.currentWeapon === 'uzi' ? 4.0 : 2.0);
                }

                // Check if the weapon just emptied and swap to the next available one
                let justEmptied = (player.currentWeapon === 'laser') ? (player.mana < 6) : (activeWeapon.ammo <= 0);
                if (justEmptied) {
                    if (player.currentWeapon !== 'pistol' && pistol.pickedUp && pistol.ammo > 0) {
                        player.currentWeapon = 'pistol';
                    } else if (player.currentWeapon !== 'uzi' && uzi.pickedUp && uzi.ammo > 0) {
                        player.currentWeapon = 'uzi';
                    } else if (player.currentWeapon !== 'laser' && laserWep.pickedUp && player.mana >= 6) {
                        player.currentWeapon = 'laser';
                    }
                }
            } else {
                if (!intentMelee) player.isMeleeing = false;
            }

            if (player.isShooting) {
                if (intentLeft) player.facingLeft = true;
                else if (intentRight) player.facingLeft = false;
            }

            if (player.isRolling) {
                let effRollSpeed = player.rollSpeed * slowMult;
                player.vx = player.rollDirection * effRollSpeed;
                player.rollDistanceLeft -= Math.abs(player.vx);
                player.rollRotation += (player.rollDirection === 1 ? 1 : -1) * (Math.PI * 2 * (16 / 200));
                isMoving = true;

                if (player.rollDistanceLeft <= 0) {
                    if (intentRoll && player.mana >= 20) {
                        player.mana -= 20;
                        player.rollDistanceLeft += 300 * GAME_CFG.WORLD_SCALE;
                        player.rollDirection = player.facingLeft ? -1 : 1;
                        player.hitEnemiesThisRoll = []; 
                        playSound('roll');
                    } else {
                        player.isRolling = false; player.vx = 0;
                    }
                }
            } else if (!player.isShooting && !player.isMeleeing) {
                if (player.isGrounded) {
                    player.vx = 0; 
                    if (intentLeft) { player.vx = -effSpeed; isMoving = true; player.facingLeft = true; } 
                    else if (intentRight) { player.vx = effSpeed; isMoving = true; player.facingLeft = false; }
                    if (intentJump) {
                        player.vy = player.jumpPower * slowMult; 
                        player.isGrounded = false;
                        playSound('jump');
                    }
                }
            } else if (player.isGrounded) {
                player.vx = 0;
            }

            player.x += player.vx; player.vy += player.gravity; player.y += player.vy;

            if (player.y + player.height >= floorY) {
                player.y = floorY - player.height; player.vy = 0; player.isGrounded = true;         
            } else { player.isGrounded = false; }

            const isActuallyWalking = (intentLeft || intentRight) && player.isGrounded && !player.isShooting && !player.isRolling && !player.isMeleeing;
            if (isActuallyWalking && musicStarted) {
                if (!walkSource) walkSource = playSound('walk');
            } else {
                if (walkSource) {
                    walkSource.stop();
                    walkSource = null;
                }
            }

            if (!pistol.pickedUp && pistol.width > 0) {
                pistol.floatY = Math.sin(frameTimeNow * pistol.floatSpeed) * pistol.floatAmplitude;
                if (player.x < pistol.x + pistol.width && pRightEdge > pistol.x && player.y < pistol.y + pistol.height && player.y + player.height > pistol.y) {
                    pistol.pickedUp = true; pistol.ammo = pistol.maxAmmo; 
                    if (!musicStarted && assets.audio.bgMusic) {
                        assets.audio.bgMusic.play().catch(console.warn);
                        musicStarted = true;
                    }
                    playSound('pickup');
                }
            }

            if (uzi.dropped && !uzi.pickedUp && uzi.width > 0) {
                uzi.vy += player.gravity; uzi.x += uzi.vx; uzi.y += uzi.vy;
                uzi.x = Math.max(0, Math.min(uzi.x, world.width - uzi.width));
                if (uzi.y + uzi.height >= floorY) { uzi.y = floorY - uzi.height; uzi.vy = 0; uzi.vx = 0; }
                uzi.floatY = Math.sin(frameTimeNow * uzi.floatSpeed) * uzi.floatAmplitude;

                const uHitX = uzi.x + 25 * GAME_CFG.WORLD_SCALE, uHitW = uzi.width - 50 * GAME_CFG.WORLD_SCALE;
                if (player.x < uHitX + uHitW && pRightEdge > uHitX && player.y < uzi.y + uzi.height && player.y + player.height > uzi.y) {
                    uzi.pickedUp = true; uzi.ammo = uzi.maxAmmo; player.currentWeapon = 'uzi'; 
                    playSound('pickup');
                }
            }

            if (laserWep.dropped && !laserWep.pickedUp && laserWep.width > 0) {
                laserWep.vy += player.gravity; laserWep.x += laserWep.vx; laserWep.y += laserWep.vy;
                laserWep.x = Math.max(0, Math.min(laserWep.x, world.width - laserWep.width));
                if (laserWep.y + laserWep.height >= floorY) { laserWep.y = floorY - laserWep.height; laserWep.vy = 0; laserWep.vx = 0; }
                laserWep.floatY = Math.sin(frameTimeNow * laserWep.floatSpeed) * laserWep.floatAmplitude;

                const lHitX = laserWep.x + 25 * GAME_CFG.WORLD_SCALE, lHitW = laserWep.width - 50 * GAME_CFG.WORLD_SCALE;
                if (player.x < lHitX + lHitW && pRightEdge > lHitX && player.y < laserWep.y + laserWep.height && player.y + player.height > laserWep.y) {
                    laserWep.pickedUp = true; laserWep.ammo = laserWep.maxAmmo; player.currentWeapon = 'laser'; 
                    playSound('pickup');
                }
            }

            if (!player.isGrounded) isMoving = true; 
            let newState = player.isRolling ? 'rolling' : player.isMeleeing ? 'melee' : player.isShooting ? 'aiming' : !player.isGrounded ? 'jumping' : isMoving ? 'walk' : 'idle';

            if (player.currentState !== newState) {
                player.currentState = newState; player.currentFrame = 0; player.frameTimer = 0;
                if (newState === 'melee') {
                    player.hitEnemiesThisMeleeFrame = [];
                    player.meleeMoveTimer = 200;
                }
            }

            if (world.width > 0 && world.height > 0) {
                player.x = Math.max(0, Math.min(player.x, world.width - player.width));
                player.y = Math.max(0, player.y);
                
                let logicalViewW = canvas.width / (renderScale || 1);
                let logicalViewH = canvas.height / (renderScale || 1);
                
                camera.x = Math.max(0, Math.min(pxCenter - (logicalViewW / 2), world.width - logicalViewW));
                camera.y = Math.max(0, Math.min(pyCenter - (logicalViewH / 2), world.height - logicalViewH));
            }

            let totalFrames, currentFrameInterval = player.defaultFrameInterval;
            if (player.currentState === 'aiming') {
                totalFrames = player.currentWeapon === 'uzi' ? player.uziAimTotalFrames : player.currentWeapon === 'laser' ? player.laserAimTotalFrames : player.aimTotalFrames;
                currentFrameInterval = player.currentWeapon === 'uzi' ? 50 : player.currentWeapon === 'laser' ? 66 : 100;
            } else if (player.currentState === 'jumping') {
                totalFrames = player.jumpTotalFrames;
            } else if (player.currentState === 'melee') {
                totalFrames = player.meleeTotalFrames;
                currentFrameInterval = player.slowStack > 0 ? Math.floor(16 / slowMult) : 16;
            } else if (player.currentState !== 'rolling') {
                totalFrames = player.currentState === 'walk' ? player.walkTotalFrames : player.idleTotalFrames;
            }
            
            if (player.currentState !== 'rolling') {
                player.frameTimer += GAME_CFG.TIME_STEP;
                if (player.frameTimer >= currentFrameInterval) {
                    player.currentFrame = (player.currentFrame + 1) % totalFrames;
                    player.frameTimer -= currentFrameInterval; 

                    if (player.currentState === 'melee') {
                        player.hitEnemiesThisMeleeFrame = [];
                    }
                }
            }

            if (player.currentState === 'melee') {
                player.meleeMoveTimer += GAME_CFG.TIME_STEP;
                const meleeMoveInterval = player.slowStack > 0 ? Math.floor(6 / slowMult) : 6;
                if (player.meleeMoveTimer >= meleeMoveInterval) {
                    let moveAmount = player.facingLeft ? -2 * GAME_CFG.WORLD_SCALE : 2 * GAME_CFG.WORLD_SCALE;
                    player.x += moveAmount;
                    player.x = Math.max(0, Math.min(player.x, world.width - player.width));
                    player.meleeMoveTimer -= meleeMoveInterval;
                }
            }

            if (player.currentState === 'melee') {
                if (player.currentFrame % 10 === 0) { 
                    if (!player.hitEnemiesThisMeleeFrame) player.hitEnemiesThisMeleeFrame = [];
                    let hitboxWidth = (player.width / 2) + 20 * GAME_CFG.WORLD_SCALE;
                    let hitX = player.facingLeft ? player.x - 20 * GAME_CFG.WORLD_SCALE : player.x + (player.width / 2);
                    let hitY = player.y;
                    let hitH = player.height;

                    for (let j = 0; j < enemies.length; j++) {
                        let w = enemies[j];
                        if (w.isDead || w.width <= 0) continue;

                        if (!player.hitEnemiesThisMeleeFrame.includes(w)) {
                             let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                             if (w.type === 'monk') { hOffX = hOffX * 1.3 - 30 * GAME_CFG.WORLD_SCALE; hOffY = hOffY * 1.3 + 50 * GAME_CFG.WORLD_SCALE; hRedW = hRedW * 1.3 - 60 * GAME_CFG.WORLD_SCALE; hRedH = hRedH * 1.3 + 100 * GAME_CFG.WORLD_SCALE; }
                             else if (w.type === 'bear') { hOffX = 20 * GAME_CFG.WORLD_SCALE; hOffY = 20 * GAME_CFG.WORLD_SCALE; hRedW = 40 * GAME_CFG.WORLD_SCALE; hRedH = 40 * GAME_CFG.WORLD_SCALE; }
                             else if (w.type === 'toyCar') { hOffX = 5 * GAME_CFG.WORLD_SCALE; hOffY = 5 * GAME_CFG.WORLD_SCALE; hRedW = 10 * GAME_CFG.WORLD_SCALE; hRedH = 10 * GAME_CFG.WORLD_SCALE; }
                             const scaleRatio = w.height / baseSizes[w.type].h;
                             hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;

                             const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                             if (hitX < wHitX + wHitW && hitX + hitboxWidth > wHitX && hitY < wHitY + wHitH && hitY + hitH > wHitY) {
                                  player.hitEnemiesThisMeleeFrame.push(w);
                                  
                                  playSound('meleeHit');

                                  applyEnemyDamage(w, 10, true);
                                  w.vx = player.facingLeft ? -1.5 * GAME_CFG.WORLD_SCALE : 1.5 * GAME_CFG.WORLD_SCALE;
                                  w.vy = -3 * GAME_CFG.WORLD_SCALE;
                                  
                                  if (w.hp <= 0) handleEnemyDeath(w);
                                  else {
                                      if (!w.isTicking) {
                                          w.currentState = 'hurt'; w.hurtTimer = 200; w.isBlinking = true; w.blinkTimer = 80;
                                      }
                                      if (w.armor > 0) { playSound('armoredWomanHurt'); } else { playSound('womanHurt'); }
                                  }
                             }
                        }
                    }
                }
            }

            if (world.width > 0 && pistol.pickedUp) {
                if (pistolActiveTimeMs >= nextSpawnTargetMs) {
                    let unlockedPool = [];
                    if (pistolActiveTimeMs >= 1000) unlockedPool.push('woman');
                    if (pistolActiveTimeMs >= 6000) unlockedPool.push('priest');
                    if (pistolActiveTimeMs >= 11000) unlockedPool.push('monk');
                    if (pistolActiveTimeMs >= 16000) unlockedPool.push('bear');
                    if (pistolActiveTimeMs >= 21000) unlockedPool.push('kfc');
                    if (pistolActiveTimeMs >= 26000) unlockedPool.push('armoredWoman');
                    if (pistolActiveTimeMs >= 31000) unlockedPool.push('downBoy');

                    if (unlockedPool.length > 0) {
                        let selectedEnemyType = unlockedPool[0]; // Fallback to 100% chance for the weakest enemy
                        for (let i = unlockedPool.length - 1; i > 0; i--) {
                            if (Math.random() <= 0.25) {
                                selectedEnemyType = unlockedPool[i];
                                break;
                            }
                        }
                        
                        spawnEnemy(selectedEnemyType);

                        nextSpawnTargetMs += currentSpawnIntervalMs;
                        currentSpawnIntervalMs = Math.max(500, currentSpawnIntervalMs - 10); 
                    }
                }
            }

            const pickupW = bulletWidth * 2.25, pickupH = bulletHeight * 2.25;
            for (let i = ammoPickups.length - 1; i >= 0; i--) {
                let a = ammoPickups[i];
                a.vy += player.gravity; a.x += a.vx; a.y += a.vy;
                a.x = Math.max(0, Math.min(a.x, world.width - pickupW));
                if (a.y >= floorY - 33 * GAME_CFG.WORLD_SCALE - pickupH) { a.y = floorY - 33 * GAME_CFG.WORLD_SCALE - pickupH; a.vy = 0; a.vx = 0; }
                a.floatY = Math.sin(frameTimeNow * pistol.floatSpeed) * 5 * GAME_CFG.WORLD_SCALE; 

                const aHitX = a.x + 30 * GAME_CFG.WORLD_SCALE, aHitY = a.y + a.floatY;
                if (player.x < aHitX + pickupW - 60 * GAME_CFG.WORLD_SCALE && pRightEdge > aHitX && player.y < aHitY + pickupH && player.y + player.height > aHitY) {
                    if (pistol.pickedUp) pistol.ammo = Math.min(pistol.maxAmmo, pistol.ammo + 15);
                    if (uzi.pickedUp) uzi.ammo = Math.min(uzi.maxAmmo, uzi.ammo + 15);
                    if (laserWep.pickedUp) laserWep.ammo = Math.min(laserWep.maxAmmo, laserWep.ammo + 15);
                    ammoPickups.splice(i, 1);
                    playSound('pickup');
                }
            }

            const hpW = assets.images.health.width * 0.078 * GAME_CFG.WORLD_SCALE, hpH = assets.images.health.height * 0.078 * GAME_CFG.WORLD_SCALE;
            for (let i = healthPickups.length - 1; i >= 0; i--) {
                let h = healthPickups[i];
                h.vy += player.gravity; h.x += h.vx; h.y += h.vy;
                h.x = Math.max(0, Math.min(h.x, world.width - hpW));
                if (h.y >= floorY - 7 * GAME_CFG.WORLD_SCALE - hpH) { h.y = floorY - 7 * GAME_CFG.WORLD_SCALE - hpH; h.vy = 0; h.vx = 0; }
                h.floatY = Math.sin(frameTimeNow * pistol.floatSpeed) * 5 * GAME_CFG.WORLD_SCALE;

                const hHitY = h.y + h.floatY;
                if (player.x < h.x + hpW && pRightEdge > h.x && player.y < hHitY + hpH && player.y + player.height > hHitY) {
                    player.hp += 1; healthPickups.splice(i, 1);
                    playSound('pickup');
                }
            }

            // --- Manage Active Lasers ---
            for (let i = activeLasers.length - 1; i >= 0; i--) {
                let l = activeLasers[i];
                l.life -= GAME_CFG.TIME_STEP;
                if (l.life <= 0) {
                    activeLasers.splice(i, 1);
                }
            }

            for (let j = enemies.length - 1; j >= 0; j--) {
                let w = enemies[j];
                const wCenter = w.x + w.width / 2;

                if (w.isDead) {
                    w.vy += 0.9 * GAME_CFG.WORLD_SCALE; w.x += w.vx; w.y += w.vy; 
                    if (Math.abs(w.rotation) < Math.abs(w.targetRotation)) w.rotation += w.rotationSpeed;
                    if (w.y > world.height + 200 * GAME_CFG.WORLD_SCALE) enemies.splice(j, 1);
                    continue; 
                }

                if (w.width > 0) {
                    w.vy += 0.9 * GAME_CFG.WORLD_SCALE; w.x += w.vx; w.y += w.vy;

                    let baseVOff;
                    switch (w.type) {
                      case 'woman': baseVOff = 14 * GAME_CFG.WORLD_SCALE; break;
                      case 'priest': baseVOff = 29 * GAME_CFG.WORLD_SCALE; break;
                      case 'monk': baseVOff = -63 * GAME_CFG.WORLD_SCALE; break;
                      case 'bear': baseVOff = 9 * GAME_CFG.WORLD_SCALE; break;
                      case 'kfc': baseVOff = 1; break;
                      case 'armoredWoman': baseVOff = 32 * GAME_CFG.WORLD_SCALE; break;
                      case 'downBoy': baseVOff = 29 * GAME_CFG.WORLD_SCALE; break;
                      case 'toyCar': baseVOff = 5; break;
                      default: baseVOff = 7 * GAME_CFG.WORLD_SCALE;
                    }
                    const visualOffset = baseVOff * (w.height / baseSizes[w.type].h);
                    const enemyFloorY = floorY - w.height - visualOffset;

                    if (w.y >= enemyFloorY) {
                        w.y = enemyFloorY; w.vy = 0;
                        if (w.type !== 'bear' || w.currentState === 'idle' || w.currentState === 'attack') w.vx = 0; 
                    }

                    if (w.type !== 'toyCar') {
                        w.facingLeft = pxCenter < wCenter;
                    }

                    if (w.type === 'armoredWoman' && w.currentState !== 'hurt') w.vx = 0;
                    if (w.type === 'kfc' && w.currentState !== 'hurt') w.vx = w.facingLeft ? -3.5 * GAME_CFG.WORLD_SCALE : 3.5 * GAME_CFG.WORLD_SCALE;
                    if (w.type === 'monk' && w.currentState !== 'hurt') w.vx = Math.abs(pxCenter - wCenter) > 300 * GAME_CFG.WORLD_SCALE ? (w.facingLeft ? -1.5 * GAME_CFG.WORLD_SCALE : 1.5 * GAME_CFG.WORLD_SCALE) : 0;

                    if (w.type === 'downBoy' && w.currentState !== 'hurt' && !w.isDead) {
                        w.frameTimer += GAME_CFG.TIME_STEP;
                        let phaseDurations = [1000, 300, 1000, 1000, 300];
                        let phaseFrames = [0, 1, 0, 2, 3];

                        if (w.frameTimer >= phaseDurations[w.dbPhase]) {
                            w.frameTimer -= phaseDurations[w.dbPhase];
                            w.dbPhase++;
                            if (w.dbPhase > 4) w.dbPhase = 3;
                            w.currentFrame = phaseFrames[w.dbPhase];

                            if (w.dbPhase === 1) { // Adjusted from 3 to 1 so they spawn on Frame 1
                                if (!w.associatedCar || w.associatedCar.isDead) {
                                    let spawnX = w.x + (w.facingLeft ? 1400 * GAME_CFG.WORLD_SCALE : -1400 * GAME_CFG.WORLD_SCALE);
                                    spawnEnemy('toyCar', spawnX, w);
                                } else {
                                    // Make the existing Toy Car turn around and face the player
                                    const carCenter = w.associatedCar.x + w.associatedCar.width / 2;
                                    w.associatedCar.facingLeft = pxCenter < carCenter;
                                }
                            }
                        }

                        if (!w.associatedCar || w.associatedCar.isDead) {
                            // If the car was destroyed, reset Down Boy to idle so he spawns a new one
                            if (w.dbPhase >= 3) {
                                w.dbPhase = 0;
                                w.currentFrame = phaseFrames[w.dbPhase];
                                w.frameTimer = 0;
                            }
                        } else {
                            // If the car is alive, wait for it to finish its run before turning it around
                            if (w.associatedCar.distanceTraveled >= 1400 * GAME_CFG.WORLD_SCALE) {
                                w.dbPhase = 0;
                                w.currentFrame = phaseFrames[w.dbPhase];
                                w.frameTimer = 0;
                                w.associatedCar.distanceTraveled = 0;
                            }
                        }
                    }

                    if (w.type === 'toyCar') {
                        if (!w.isDead && w.currentState !== 'hurt') {
                            w.frameTimer += GAME_CFG.TIME_STEP;
                            if (w.frameTimer >= 30) {
                                w.currentFrame = (w.currentFrame + 1) % 6;
                                w.frameTimer -= 30;
                            }

                            if (w.owner && !w.owner.isDead && (w.owner.currentFrame === 2 || w.owner.currentFrame === 3)) {
                                let speed = 8 * GAME_CFG.WORLD_SCALE; // Increased to 8
                                w.vx = w.facingLeft ? -speed : speed;
                                w.distanceTraveled += Math.abs(w.vx);
                            } else {
                                w.vx = 0;
                            }
                        } else if (w.isDead) {
                            w.vx = 0;
                        }
                    }

                    if (w.type === 'bear' && w.currentState !== 'hurt') {
                        const distToPlayer = Math.abs(pxCenter - wCenter);
                        w.stateTimer -= GAME_CFG.TIME_STEP;
                        if (w.currentState === 'idle') {
                            w.vx = 0;
                            if (w.stateTimer <= 0) {
                                w.currentState = distToPlayer >= 400 * GAME_CFG.WORLD_SCALE ? 'run' : 'attack';
                                w.currentFrame = 0; w.frameTimer = 0;
                            }
                        } else if (w.currentState === 'run') {
                            w.vx = w.facingLeft ? -4 * GAME_CFG.WORLD_SCALE : 4 * GAME_CFG.WORLD_SCALE;
                            if (distToPlayer < 400 * GAME_CFG.WORLD_SCALE) { w.currentState = 'attack'; w.currentFrame = 0; w.frameTimer = 0; w.vx = 0; }
                        } else if (w.currentState === 'attack') {
                            w.vx = 0; w.facingLeft = pxCenter < wCenter;
                        }
                    }

                    if (w.type === 'toyCar' && !w.isDead && !player.isRolling) {
                        let hOffX = 5 * GAME_CFG.WORLD_SCALE, hOffY = 5 * GAME_CFG.WORLD_SCALE, hRedW = 10 * GAME_CFG.WORLD_SCALE, hRedH = 10 * GAME_CFG.WORLD_SCALE;
                        const scaleRatio = w.height / baseSizes[w.type].h;
                        hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;
                        const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                        if (pHitXCenter < wHitX + wHitW && pHitXCenter + pHitWCenter > wHitX && pHitYCenter < wHitY + wHitH && pHitYCenter + pHitHCenter > wHitY) {
                            if (!player.isBlinking) {
                                player.hp = Math.max(0, player.hp - 1);
                                player.isBlinking = true; player.blinkTimer = 80;
                                playSound('playerHurt');
                            }
                            w.hp = 0;
                            w.armor = 0;
                            handleEnemyDeath(w);
                        }
                    }

                    if (w.type === 'kfc' && !w.isDead && !player.isRolling) {
                        let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                        const scaleRatio = w.height / baseSizes[w.type].h;
                        hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;
                        const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                        if (pHitXCenter < wHitX + wHitW && pHitXCenter + pHitWCenter > wHitX && pHitYCenter < wHitY + wHitH && pHitYCenter + pHitHCenter > wHitY) {
                            if (!w.isTicking) {
                                w.isTicking = true;
                                w.tickingTimer = 0;
                            }
                        }
                    }

                    if (w.isTicking && !w.isDead) {
                        w.tickingTimer += GAME_CFG.TIME_STEP;
                        if (w.tickingTimer >= 2000) {
                            w.hp = 0;
                            w.exploded = true;
                            handleEnemyDeath(w);
                            
                            let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                            const scaleRatio = w.height / baseSizes[w.type].h;
                            hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;
                            const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                            if (!player.isRolling && pHitXCenter < wHitX + wHitW && pHitXCenter + pHitWCenter > wHitX && pHitYCenter < wHitY + wHitH && pHitYCenter + pHitHCenter > wHitY) {
                                if (!player.isBlinking) {
                                    player.hp = Math.max(0, player.hp - 1);
                                    player.isBlinking = true; player.blinkTimer = 80;
                                    playSound('playerHurt');
                                }
                            }
                        }
                    }

                    if (w.currentState === 'hurt') {
                        w.hurtTimer -= GAME_CFG.TIME_STEP;
                        if (w.hurtTimer <= 0) {
                            w.currentState = 'idle'; 
                            w.currentFrame = 0; w.frameTimer = 0;
                            if (w.type === 'bear') w.stateTimer = 3000;
                            if (w.type === 'downBoy') {
                                w.dbPhase = 1;
                                w.currentFrame = 1;
                            }
                        }
                    } else if (w.type !== 'downBoy' && w.type !== 'toyCar') {
                        w.frameTimer += GAME_CFG.TIME_STEP;
                        
                        if (w.type === 'bear') {
                            if (w.currentState === 'run') {
                                if (w.frameTimer >= 50) { w.currentFrame = (w.currentFrame + 1) % 21; w.frameTimer -= 50; }
                            } else if (w.currentState === 'attack') {
                                if (w.currentFrame === 0 && w.frameTimer >= 460) {
                                    w.currentFrame = 1; w.frameTimer -= 460;
                                    rainbowHearts.push({ x: w.facingLeft ? w.x - 20 * GAME_CFG.WORLD_SCALE : w.x + w.width - 20 * GAME_CFG.WORLD_SCALE, y: w.y, startY: w.y, vx: w.facingLeft ? -4.5 * GAME_CFG.WORLD_SCALE : 4.5 * GAME_CFG.WORLD_SCALE, distanceTraveled: 0, alpha: 1.0, scale: 0.5 * enemySizeMultiplier });
                                } else if (w.currentFrame === 1 && w.frameTimer >= 470) {
                                    w.currentState = 'idle'; w.stateTimer = 3000; w.currentFrame = 0; w.frameTimer = 0;
                                }
                            } else { 
                                const currentDuration = w.currentFrame === 0 ? 1100 : 300;
                                if (w.frameTimer >= currentDuration) { w.currentFrame = (w.currentFrame + 1) % 2; w.frameTimer -= currentDuration; }
                            }
                        } else {
                            const currentDuration = w.frameDurations[w.currentFrame];
                            if (w.frameTimer >= currentDuration) {
                                w.currentFrame = (w.currentFrame + 1) % w.totalFrames;
                                w.frameTimer -= currentDuration;

                                if (w.currentFrame === w.totalFrames - 1) {
                                    if (w.type === 'woman') {
                                        throwingStars.push({ x: w.facingLeft ? w.x - (starWidth * enemySizeMultiplier) : w.x + w.width, y: w.y + (w.height / 2) - ((starHeight * enemySizeMultiplier) / 2) - 10 * GAME_CFG.WORLD_SCALE, vx: w.facingLeft ? -15 * GAME_CFG.WORLD_SCALE : 15 * GAME_CFG.WORLD_SCALE, vy: -6 * GAME_CFG.WORLD_SCALE, rotation: 0, scale: enemySizeMultiplier });
