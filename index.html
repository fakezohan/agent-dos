                                    } else if (w.type === 'priest') {
                                        crosses.push({ x: player.x + (player.width / 2) - ((crossWidth * enemySizeMultiplier) / 2), y: player.y - 900 * GAME_CFG.WORLD_SCALE, vy: 0, scale: enemySizeMultiplier });
                                    }
                                }
                            }
                        }
                    }

                    if (w.isBlinking) { w.blinkTimer -= GAME_CFG.TIME_STEP; if (w.blinkTimer <= 0) w.isBlinking = false; }

                    if (player.isRolling) {
                        let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                        if (w.type === 'monk') { hOffX = hOffX * 1.3 - 30 * GAME_CFG.WORLD_SCALE; hOffY = hOffY * 1.3 + 50 * GAME_CFG.WORLD_SCALE; hRedW = hRedW * 1.3 - 60 * GAME_CFG.WORLD_SCALE; hRedH = hRedH * 1.3 + 100 * GAME_CFG.WORLD_SCALE; }
                        else if (w.type === 'bear') { hOffX = 20 * GAME_CFG.WORLD_SCALE; hOffY = 20 * GAME_CFG.WORLD_SCALE; hRedW = 40 * GAME_CFG.WORLD_SCALE; hRedH = 40 * GAME_CFG.WORLD_SCALE; }
                        else if (w.type === 'toyCar') { hOffX = 5 * GAME_CFG.WORLD_SCALE; hOffY = 5 * GAME_CFG.WORLD_SCALE; hRedW = 10 * GAME_CFG.WORLD_SCALE; hRedH = 10 * GAME_CFG.WORLD_SCALE; }

                        const scaleRatio = w.height / baseSizes[w.type].h;
                        hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;

                        const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;
                        const rSize = player.height * 0.56; 
                        const pHitX = pxCenter - (rSize / 2), pHitY = player.y + player.height - rSize;

                        if (pHitX < wHitX + wHitW && pHitX + rSize > wHitX && pHitY < wHitY + wHitH && pHitY + rSize > wHitY) {
                            if (!player.hitEnemiesThisRoll.includes(w)) {
                                player.hitEnemiesThisRoll.push(w);
                                applyEnemyDamage(w, 5, true);
                                w.vx = (player.rollDirection > 0) ? 1.25 * GAME_CFG.WORLD_SCALE : -1.25 * GAME_CFG.WORLD_SCALE; w.vy = -8 * GAME_CFG.WORLD_SCALE; 

                                if (w.hp <= 0) handleEnemyDeath(w);
                                else {
                                    if (!w.isTicking) {
                                        w.currentState = 'hurt'; w.hurtTimer = 200; w.isBlinking = true; w.blinkTimer = 80;
                                    }
                                    if (w.armor > 0) { playSound('armoredWomanHurt'); } else { playSound('womanHurt'); }
                                }
                            }
                        }
                    }
                }
            }

            for (let i = crosses.length - 1; i >= 0; i--) {
                let c = crosses[i];
                c.vy += player.gravity * 1.1; c.y += c.vy;
                const cW = crossWidth * c.scale;
                const cH = crossHeight * c.scale;

                if (c.y + cH >= floorY) { crosses.splice(i, 1); continue; }

                const cYOff = 10 * c.scale * GAME_CFG.WORLD_SCALE;
                const cHOff = 20 * c.scale * GAME_CFG.WORLD_SCALE;

                if (c.x < pHitXCenter + pHitWCenter && c.x + cW > pHitXCenter && c.y + cYOff < pHitYCenter + pHitHCenter && c.y + cYOff + cH - cHOff > pHitYCenter) {
                    crosses.splice(i, 1); 
                    if (!player.isRolling && !player.isBlinking) { 
                        player.hp = Math.max(0, player.hp - 1); player.isBlinking = true; player.blinkTimer = 80; 
                        playSound('playerHurt');
                    }
                }
            }

            for (let i = throwingStars.length - 1; i >= 0; i--) {
                let s = throwingStars[i];
                s.vy += 0.225 * GAME_CFG.WORLD_SCALE; s.x += s.vx; s.y += s.vy; s.rotation += (s.vx > 0 ? 0.45 : -0.45);
                const sW = starWidth * s.scale, sH = starHeight * s.scale;

                if (s.y + sH >= floorY) { throwingStars.splice(i, 1); continue; }

                const yOff = 30 * s.scale * GAME_CFG.WORLD_SCALE;
                const hOff = 60 * s.scale * GAME_CFG.WORLD_SCALE;

                if (s.x < pHitXCenter + pHitWCenter && s.x + sW > pHitXCenter && s.y + yOff < pHitYCenter + pHitHCenter && s.y + yOff + sH - hOff > pHitYCenter) {
                    throwingStars.splice(i, 1); 
                    if (!player.isRolling && !player.isBlinking) { 
                        player.hp = Math.max(0, player.hp - 1); player.isBlinking = true; player.blinkTimer = 80; 
                        playSound('playerHurt');
                    }
                    continue;
                }
                if (s.x < 0 || s.x > world.width) throwingStars.splice(i, 1);
            }

            const heartBaseW = (assets.images.bearAttack.width / 3) * (GAME_CFG.ENEMY_SCALE * 2.218);
            const heartBaseH = assets.images.bearAttack.height * (GAME_CFG.ENEMY_SCALE * 2.218);

            for (let i = rainbowHearts.length - 1; i >= 0; i--) {
                let h = rainbowHearts[i];
                h.distanceTraveled += Math.abs(h.vx); h.x += h.vx; h.y = h.startY + Math.sin(h.distanceTraveled * 0.05 / GAME_CFG.WORLD_SCALE) * 40 * GAME_CFG.WORLD_SCALE;
                if (h.distanceTraveled >= 450 * GAME_CFG.WORLD_SCALE) { rainbowHearts.splice(i, 1); continue; }

                const hHitW = heartBaseW * h.scale * GAME_CFG.WORLD_SCALE, hHitH = heartBaseH * h.scale * GAME_CFG.WORLD_SCALE;
                const hHitX = h.x + (heartBaseW * GAME_CFG.WORLD_SCALE - hHitW) / 2, hHitY = h.y + (heartBaseH * GAME_CFG.WORLD_SCALE - hHitH) / 2;

                if (hHitX < pHitXCenter + pHitWCenter && hHitX + hHitW > pHitXCenter && hHitY < pHitYCenter + pHitHCenter && hHitY + hHitH > pHitYCenter) {
                    rainbowHearts.splice(i, 1);
                    if (!player.isRolling && !player.isBlinking) {
                        player.hp = Math.max(0, player.hp - 1); player.isBlinking = true; player.blinkTimer = 80; 
                        playSound('playerHurt');
                    }
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.x += b.vx; b.y += b.vy; 
                let hitRegistered = false;

                for (let j = 0; j < enemies.length; j++) {
                    let w = enemies[j];
                    if (w.isDead || w.width <= 0) continue;

                    let hOffX = 30 * GAME_CFG.WORLD_SCALE, hOffY = 10 * GAME_CFG.WORLD_SCALE, hRedW = 60 * GAME_CFG.WORLD_SCALE, hRedH = 30 * GAME_CFG.WORLD_SCALE;
                    if (w.type === 'monk') { hOffX = hOffX * 1.3 - 30 * GAME_CFG.WORLD_SCALE; hOffY = hOffY * 1.3 + 50 * GAME_CFG.WORLD_SCALE; hRedW = hRedW * 1.3 - 60 * GAME_CFG.WORLD_SCALE; hRedH = hRedH * 1.3 + 100 * GAME_CFG.WORLD_SCALE; }
                    else if (w.type === 'bear') { hOffX = 20 * GAME_CFG.WORLD_SCALE; hOffY = 20 * GAME_CFG.WORLD_SCALE; hRedW = 40 * GAME_CFG.WORLD_SCALE; hRedH = 40 * GAME_CFG.WORLD_SCALE; }
                    else if (w.type === 'toyCar') { hOffX = 5 * GAME_CFG.WORLD_SCALE; hOffY = 5 * GAME_CFG.WORLD_SCALE; hRedW = 10 * GAME_CFG.WORLD_SCALE; hRedH = 10 * GAME_CFG.WORLD_SCALE; }

                    const scaleRatio = w.height / baseSizes[w.type].h;
                    hOffX *= scaleRatio; hOffY *= scaleRatio; hRedW *= scaleRatio; hRedH *= scaleRatio;

                    const wHitX = w.x + hOffX, wHitY = w.y + hOffY, wHitW = w.width - hRedW, wHitH = w.height - hRedH;

                    if (b.x < wHitX + wHitW && b.x + bulletWidth > wHitX && b.y < wHitY + wHitH && b.y + bulletHeight > wHitY) {
                        w.vx = (b.vx > 0) ? 0.625 * GAME_CFG.WORLD_SCALE : -0.625 * GAME_CFG.WORLD_SCALE; w.vy = -4 * GAME_CFG.WORLD_SCALE; 
                        
                        applyEnemyDamage(w, b.damage);

                        if (w.hp <= 0) handleEnemyDeath(w);
                        else {
                            if (!w.isTicking) {
                                w.currentState = 'hurt'; w.hurtTimer = 200; w.isBlinking = true; w.blinkTimer = 80;       
                            }
                            if (w.armor > 0) { playSound('armoredWomanHurt'); } else { playSound('womanHurt'); }
                        }
                        bullets.splice(i, 1); hitRegistered = true; break; 
                    }
                }
                if (!hitRegistered && (b.x < 0 || b.x > world.width)) bullets.splice(i, 1);
            }
        }

        // --- Render logic ---
        const cornerAnims = [
            { id: 'walk',  key: 'walk',  started: false, finished: false, timer: 0, frame: 0, cols: 6, rows: 6, total: 36, flip: false, corner: 'BL1', scale: 0.3 },
            { id: 'kfc',   key: 'kfcRun',started: false, finished: false, timer: 0, frame: 0, cols: 6, rows: 7, total: 42, flip: false,  corner: 'BL2', scale: 0.25 },
            { id: 'idle',  key: 'idle',  started: false, finished: false, timer: 0, frame: 0, cols: 5, rows: 8, total: 40, flip: false, corner: 'BL3', scale: 0.3 },
            { id: 'melee', key: 'melee', started: false, finished: false, timer: 0, frame: 0, cols: 8, rows: 9, total: 72, flip: false,  corner: 'BL4', scale: 0.3 }
        ];

        function renderLoading(deltaTime) {
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let allAnimsFinished = true;
            if (!isMobile) {
                const animDt = Math.min(deltaTime || 0, 30); 

                for(let anim of cornerAnims) {
                    const img = assets.images[anim.key];
                    if (img && img.width > 0 && !anim.finished) {
                        anim.started = true;
                    }
                    
                    if (anim.started && !anim.finished) {
                        allAnimsFinished = false;
                        anim.timer += animDt;
                        while (anim.timer >= 30) {
                            anim.timer -= 30;
                            anim.frame++;
                            if (anim.frame >= anim.total) {
                                anim.finished = true;
                                anim.frame = anim.total - 1; 
                                break;
                            }
                        }
                    } else if (!anim.finished) {
                        allAnimsFinished = false;
                    }
                    
                    if (anim.started && !anim.finished) {
                        const sW = img.width / anim.cols;
                        const sH = img.height / anim.rows;
                        const sx = (anim.frame % anim.cols) * sW;
                        const sy = Math.floor(anim.frame / anim.cols) * sH;
                        
                        const drawW = sW * anim.scale;
                        const drawH = sH * anim.scale;
                        
                        let drawX = 0, drawY = 0;
                        const margin = 30;
                        if (anim.corner === 'BL1') { drawX = canvas.width / 5 - drawW / 2; drawY = canvas.height / 2 - drawH / 2; }
                        if (anim.corner === 'BL2') { drawX = canvas.width * 2 / 5 - drawW / 2; drawY = canvas.height / 2 - drawH / 2; }
                        if (anim.corner === 'BL3') { drawX = canvas.width * 3 / 5 - drawW / 2; drawY = canvas.height / 2 - drawH / 2; }
                        if (anim.corner === 'BL4') { drawX = canvas.width * 4 / 5 - drawW / 2; drawY = canvas.height / 2 - drawH / 2; }
                        
                        ctx.save();
                        if (anim.flip) {
                            ctx.translate(drawX + drawW, drawY);
                            ctx.scale(-1, 1);
                            ctx.drawImage(img, sx, sy, sW, sH, 0, 0, drawW, drawH);
                        } else {
                            ctx.drawImage(img, sx, sy, sW, sH, drawX, drawY, drawW, drawH);
                        }
                        ctx.restore();
                    }
                }
            }

            if (gameState === 'LOADING_DONE_WAITING' && allAnimsFinished) {
                if (isMobile) {
                    gameState = 'TAP_TO_START';
                } else {
                    gameState = 'PLAYING';
                }
            }

            ctx.save();
            
            // Move the drawing origin to the exact center of the canvas
            ctx.translate(canvas.width / 2, canvas.height / 2);

            // Dynamically calculate a proportional scale based on the window size.
            const scale = Math.min(canvas.width / 800, canvas.height / 600);
            ctx.scale(scale, scale);


            ctx.fillStyle = "black";
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            // Render either "Tap to Play" or the standard loading bar based on state
            if (gameState === 'TAP_TO_START') {                
                ctx.fillText('Tap to Continue', 0, 200);
                if (assets.images.jumpImage && assets.images.jumpImage.width > 0) {
                    const drawW = assets.images.jumpImage.width * player.jumpScale * GAME_CFG.WORLD_SCALE;
                    const drawH = assets.images.jumpImage.height * player.jumpScale * GAME_CFG.WORLD_SCALE;
                    
                    ctx.drawImage(
                        assets.images.jumpImage, 
                        Math.floor(-drawW / 2), 
                        Math.floor(-drawH + 100), 
                        drawW, 
                        drawH
                    );
                }
            } else {
                const rawPct = totalAssets > 0 ? loadedAssets / totalAssets : 0;
                const displayPct = Math.min(100, Math.floor(rawPct * 100));
                ctx.fillText('Loading... ' + displayPct + '%', 0, 200);
            }

            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- GPU Texture Keep-Alive Hack ---
            if (isMobile) {
                ctx.save();
                ctx.globalAlpha = 0.01; // Practically invisible
                // Draw a tiny 1x1 pixel of your sprite sheets off-screen
                ctx.drawImage(assets.images.walk, 0, 0, 1, 1, -10, -10, 1, 1);
                ctx.drawImage(assets.images.melee, 0, 0, 1, 1, -10, -10, 1, 1);
                ctx.drawImage(assets.images.idle, 0, 0, 1, 1, -10, -10, 1, 1);
                ctx.restore();
            }

            ctx.textAlign = "left"; 

            let logicalViewW = canvas.width / (renderScale || 1);
            let logicalViewH = canvas.height / (renderScale || 1);

            if (world.width > 0 && world.height > 0) {
                // --- WORLD RENDERING (Scaled to Screen) ---
                ctx.save();
                ctx.scale(renderScale, renderScale);

                let backgroundHeightToCanvasHeightRatio = logicalViewH / assets.images.background.height;
                ctx.drawImage(assets.images.background, -camera.x, 0, assets.images.background.width * backgroundHeightToCanvasHeightRatio, logicalViewH);

                // Render Lasers
                ctx.save();
                ctx.lineJoin = "round";
                for (let i = activeLasers.length - 1; i >= 0; i--) {
                    let l = activeLasers[i];
                    
                    if (!isMobile) {
                        ctx.shadowColor = 'cyan';
                        ctx.shadowBlur = 10;
                    }
                    ctx.lineWidth = 4 * GAME_CFG.WORLD_SCALE;
                    ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
                    
                    ctx.beginPath();
                    let dist = Math.abs(l.endX - l.startX);
                    for (let d = 0; d <= dist; d += 4) {
                        let x = l.startX + l.dir * d;
                        let wave = Math.sin(d * 0.05 - frameTimeNow * 0.02) * 12 * GAME_CFG.WORLD_SCALE;
                        let screenX = x - camera.x;
                        let screenY = l.startY + wave - camera.y;
                        if (d === 0) ctx.moveTo(screenX, screenY);
                        else ctx.lineTo(screenX, screenY);
                    }
                    ctx.lineTo(l.endX - camera.x, l.startY + Math.sin(dist * 0.05 - frameTimeNow * 0.02) * 12 * GAME_CFG.WORLD_SCALE - camera.y);
                    ctx.stroke();

                    ctx.lineWidth = 2 * GAME_CFG.WORLD_SCALE;
                    ctx.strokeStyle = "rgba(255, 255, 255, 1)";
                    ctx.stroke();
                }
                ctx.restore();

                if (!isMobile) {
                    ctx.shadowColor = 'orange'; 
                    ctx.shadowBlur = 10;
                }
                for (let b of bullets) {
                    const screenX = b.x - camera.x, screenY = b.y - camera.y;
                    ctx.save();
                    if (b.vx < 0) { ctx.scale(-1, 1); ctx.drawImage(assets.images.bullet, -screenX - bulletWidth, screenY, bulletWidth, bulletHeight); } 
                    else { ctx.drawImage(assets.images.bullet, screenX, screenY, bulletWidth, bulletHeight); }
                    ctx.restore();
                }

                if (!isMobile) {
                    ctx.shadowColor = 'lime'; 
                    ctx.shadowBlur = 15;
                }
                for (let s of throwingStars) {
                    const sW = starWidth * s.scale, sH = starHeight * s.scale;
                    ctx.save();
                    ctx.translate(s.x - camera.x + sW / 2, s.y - camera.y + sH / 2);
                    ctx.rotate(s.rotation); ctx.drawImage(assets.images.star, -sW / 2, -sH / 2, sW, sH);
                    ctx.restore();
                }
                for (let c of crosses) { 
                    const cW = crossWidth * c.scale, cH = crossHeight * c.scale;
                    ctx.drawImage(assets.images.cross, c.x - camera.x, c.y - camera.y, cW, cH); 
                }
                
                const heartBaseW = (assets.images.bearAttack.width / 3) * (GAME_CFG.ENEMY_SCALE * 2.218) * GAME_CFG.WORLD_SCALE;
                const heartBaseH = assets.images.bearAttack.height * (GAME_CFG.ENEMY_SCALE * 2.218) * GAME_CFG.WORLD_SCALE;
                for (let h of rainbowHearts) {
                    const rW = heartBaseW * h.scale, rH = heartBaseH * h.scale;
                    const screenX = h.x - camera.x + (heartBaseW - rW) / 2, screenY = h.y - camera.y + (heartBaseH - rH) / 2;
                    ctx.save();
                    ctx.globalAlpha = h.alpha; 
                    if (!isMobile) {
                        ctx.shadowColor = 'lime'; 
                        ctx.shadowBlur = 15;
                    }
                    if (h.vx < 0) {
                        ctx.translate(screenX + rW / 2, screenY + rH / 2); ctx.scale(-1, 1);
                        ctx.drawImage(assets.images.bearAttack, (assets.images.bearAttack.width / 3) * 2, 0, assets.images.bearAttack.width / 3, assets.images.bearAttack.height, -rW / 2, -rH / 2, rW, rH);
                    } else {
                        ctx.drawImage(assets.images.bearAttack, (assets.images.bearAttack.width / 3) * 2, 0, assets.images.bearAttack.width / 3, assets.images.bearAttack.height, screenX, screenY, rW, rH);
                    }
                    ctx.restore();
                }
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

                for (let w of enemies) {
                    if (w.width <= 0) continue; 
                    let activeImg = w.type === 'woman' ? assets.images.womanIdle : w.type === 'priest' ? assets.images.priestIdle : w.type === 'monk' ? assets.images.monkIdle : w.type === 'kfc' ? assets.images.kfcRun : w.type === 'armoredWoman' ? assets.images.armoredWoman : w.type === 'downBoy' ? assets.images.downBoy : w.type === 'toyCar' ? assets.images.toyCar : (w.currentState === 'run' ? assets.images.bearRun : w.currentState === 'attack' ? assets.images.bearAttack : assets.images.bearIdle);

                    ctx.save();
                    
                    let drawScale = 1.0;
                    
                    if (!isMobile && !w.isDead) {
                        if (w.type === 'toyCar' || (w.type === 'kfc' && w.isTicking && w.tickingTimer >= 1800)) {
                            ctx.shadowColor = 'lime';
                            ctx.shadowBlur = 15;
                        }
                    }

                    if (w.isTicking && !w.isDead) {
                        let isFlash = false;
                        let isWhite = false;

                        let t = w.tickingTimer;
                        if (t < 1000) {
                            if (t % 250 < 100) isFlash = true;
                        } else if (t < 1800) {
                            if (t % 100 < 60) isFlash = true;
                        } else if (t < 1900) {
                            isFlash = true;
                        } else {
                            isFlash = true;
                            isWhite = true;
                        }

                        if (t > 1500) {
                            drawScale = 1.0 + 0.2 * ((t - 1500) / 500);
                        }

                        if (isFlash || isWhite) {
                            if (!isMobile) {
                                if (isWhite) {
                                    ctx.filter = 'brightness(1000%) grayscale(100%) drop-shadow(0px 0px 5px rgba(255,255,255,0.4))';
                                } else if (isFlash) {
                                    ctx.filter = 'brightness(100%) sepia(100%) hue-rotate(315deg) saturate(800%) drop-shadow(0px 0px 3px rgba(255,0,0,0.4))';
                                }
                            } else {
                                if (isWhite || isFlash) {
                                    ctx.globalCompositeOperation = 'lighter';
                                    ctx.globalAlpha = isWhite ? 0.9 : 0.6;
                                }
                            }
                        }
                    } else if (w.isBlinking) {
                        if (!isMobile) {
                            ctx.filter = 'brightness(1000%) grayscale(100%)'; 
                        } else {
                            ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.7;
                        }
                    }

                    let imgToDraw = null, sx, sy, sWidth, sHeight;
                    if (w.currentState === 'hurt' || w.isDead) {
                        if (w.type === 'monk') { imgToDraw = assets.images.monkIdle; sWidth = assets.images.monkIdle.width / 3; sHeight = assets.images.monkIdle.height; sx = 2 * sWidth; sy = 0; } 
                        else if (w.type === 'bear') { imgToDraw = assets.images.bearHurt; sWidth = assets.images.bearHurt.width; sHeight = assets.images.bearHurt.height; sx = 0; sy = 0; } 
                        else if (w.type === 'kfc') { imgToDraw = assets.images.kfcHurt; sWidth = assets.images.kfcHurt.width; sHeight = assets.images.kfcHurt.height; sx = 0; sy = 0; }
                        else if (w.type === 'armoredWoman') { imgToDraw = assets.images.armoredWoman; sWidth = imgToDraw.width; sHeight = imgToDraw.height / 5; sx = 0; sy = 4 * sHeight; }
                        else if (w.type === 'downBoy') { imgToDraw = assets.images.downBoy; sWidth = imgToDraw.width; sHeight = imgToDraw.height / 5; sx = 0; sy = 1 * sHeight; }
                        else if (w.type === 'toyCar') { imgToDraw = assets.images.toyCar; sWidth = imgToDraw.width / 2; sHeight = imgToDraw.height / 3; sx = 0; sy = 0; }
                        else { const hurtImg = w.type === 'woman' ? assets.images.womanHurt : assets.images.priestHurt; imgToDraw = hurtImg; sWidth = hurtImg.width; sHeight = hurtImg.height; sx = 0; sy = 0; }
                    }
                    
                    if (!imgToDraw) {
                        if (w.type === 'bear' && w.currentState === 'idle') { imgToDraw = assets.images.bearIdle; sWidth = assets.images.bearIdle.width / 2; sHeight = assets.images.bearIdle.height; sx = w.currentFrame * sWidth; sy = 0; } 
                        else if (w.type === 'bear' && w.currentState === 'attack') { imgToDraw = assets.images.bearAttack; sWidth = assets.images.bearAttack.width / 3; sHeight = assets.images.bearAttack.height; sx = w.currentFrame * sWidth; sy = 0; } 
                        else if (w.type === 'armoredWoman') { imgToDraw = assets.images.armoredWoman; sWidth = imgToDraw.width; sHeight = imgToDraw.height / 5; sx = 0; sy = w.currentFrame * sHeight; }
                        else { imgToDraw = activeImg; sWidth = activeImg.width / w.cols; sHeight = activeImg.height / w.rows; sx = (w.currentFrame % w.cols) * sWidth; sy = Math.floor(w.currentFrame / w.cols) * sHeight; }
                    }

                    ctx.translate(w.x - camera.x + w.width / 2, w.y - camera.y + w.height / 2);
                    if (w.isDead) ctx.rotate(w.rotation); 
                    if (w.facingLeft) ctx.scale(-1, 1);
                    ctx.scale(drawScale, drawScale); 
                    ctx.drawImage(imgToDraw, sx, sy, sWidth, sHeight, -w.width / 2, -w.height / 2, w.width, w.height);
                    ctx.restore();

                    if (!w.isDead) {
                        ctx.save();
                        const startX = w.x - camera.x;
                        const barW = 110; // Scaled up
                        const barX = startX + (w.width - barW) / 2;
                        const barH = 18; // Scaled up
                        const barY = 725;

                        ctx.shadowBlur = 0;
                        
                        ctx.fillStyle = "rgba(80,80,80,0.7)";
                        ctx.fillRect(barX, barY, barW, barH);

                        const hpPercent = Math.max(0, w.hp / w.maxHp);
                        const fillW = barW * hpPercent;
                        
                        if (fillW > 0 && w.type !== 'toyCar') {
                            if (isMobile) {
                                ctx.fillStyle = "#b32a30";
                            } else {
                                const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                                grad.addColorStop(0, "#d98a8e");
                                grad.addColorStop(0.33, "#c94c53");
                                grad.addColorStop(0.66, "#b32a30");
                                grad.addColorStop(1, "#a31a20");
                                ctx.fillStyle = grad;
                            }
                            ctx.fillRect(barX, barY, fillW, barH);
                        }

                        let hpText = w.type !== 'toyCar' ? Math.ceil(Math.max(0, w.hp)) + "/" + w.maxHp : "";

                        if (w.maxArmor !== undefined && w.maxArmor > 0 && w.armor > 0) {
                            const armorPercent = Math.max(0, w.armor / w.maxArmor);
                            const armorFillW = barW * armorPercent;
                            
                            if (isMobile) {
                                ctx.fillStyle = "#b48a04";
                            } else {
                                const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                                grad.addColorStop(0, "#b48a04");   
                                grad.addColorStop(0.5, "#823c00"); 
                                grad.addColorStop(1, "#4e2400"); 
                                ctx.fillStyle = grad;
                            }
                            ctx.fillRect(barX, barY, armorFillW, barH);
                            
                            hpText = Math.ceil(Math.max(0, w.armor)) + "/" + w.maxArmor;
                        }

                        ctx.strokeStyle = "rgba(200,200,200,0.9)";
                        ctx.lineWidth = 1;
                        ctx.lineJoin = "round";
                        ctx.strokeRect(barX, barY, barW, barH);

                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "18px 'Arial White', sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(hpText, barX + barW / 2, barY + barH - 3);

                        ctx.restore();
                    }
                }

                const pickupW = bulletWidth * 2.25, pickupH = bulletHeight * 2.25;
                if (!isMobile) {
                    ctx.shadowColor = 'white'; 
                    ctx.shadowBlur = 15;
                }
                for (let a of ammoPickups) {
                    ctx.save(); ctx.translate(a.x - camera.x + pickupW / 2, a.y - camera.y + a.floatY + pickupH / 2 - 16); ctx.rotate(-Math.PI / 2); ctx.drawImage(assets.images.bullet, -pickupW / 2, -pickupH / 2, pickupW, pickupH); ctx.restore();
                }
                
                const hpW = assets.images.health.width * 0.078 * GAME_CFG.WORLD_SCALE, hpH = assets.images.health.height * 0.078 * GAME_CFG.WORLD_SCALE;
                for (let h of healthPickups) { ctx.drawImage(assets.images.health, h.x - camera.x, h.y - camera.y + h.floatY - 2, hpW, hpH); }

                if (!isMobile) {
                    ctx.shadowOffsetY = 10; 
                    ctx.shadowBlur = 20;
                }
                if (pistol.width > 0 && !pistol.pickedUp) ctx.drawImage(assets.images.pistol, pistol.x - camera.x, pistol.y - camera.y + pistol.floatY, pistol.width, pistol.height);
                if (uzi.dropped && uzi.width > 0 && !uzi.pickedUp) ctx.drawImage(assets.images.uzi, uzi.x - camera.x, uzi.y - camera.y + uzi.floatY - 106 * GAME_CFG.WORLD_SCALE, uzi.width * 0.85, uzi.height * 0.85);
                if (laserWep.dropped && laserWep.width > 0 && !laserWep.pickedUp) ctx.drawImage(assets.images.laser, laserWep.x - camera.x, laserWep.y - camera.y + laserWep.floatY - 97 * GAME_CFG.WORLD_SCALE, laserWep.width, laserWep.height);

                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

                if (player.currentState === 'rolling') {
                    const rSize = player.height * 0.56; 
                    ctx.save(); 
                    if (!isMobile) {
                        ctx.shadowColor = player.slowStack > 0 ? 'cyan' : 'orange'; 
                        ctx.shadowBlur = player.slowStack > 0 ? 30 : 15;
                    }
                    if (player.isBlinking) {
                        if (!isMobile) {
                            ctx.filter = 'brightness(1000%) grayscale(100%)';
                        } else {
                            ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.7;
                        }
                    }
                    ctx.translate(player.x + (player.width / 2) - camera.x, player.y + player.height - (rSize / 2) - camera.y);
                    ctx.rotate(player.rollRotation); ctx.drawImage(assets.images.roll, -rSize/2, -rSize/2, rSize, rSize);
                    ctx.restore();
                } else {
                    let activeImage, cols, rows;
                    if (player.currentState === 'aiming') { 
                        activeImage = player.currentWeapon === 'uzi' ? assets.images.uziAim : 
                                      player.currentWeapon === 'laser' ? assets.images.laserAim :
                                      assets.images.aim; 
                        cols = player.currentWeapon === 'uzi' ? player.uziAimCols : 
                               player.currentWeapon === 'laser' ? player.laserAimCols :
                               player.aimCols; 
                        rows = player.currentWeapon === 'uzi' ? player.uziAimRows : 
                               player.currentWeapon === 'laser' ? player.laserAimRows :
                               player.aimRows; 
                    } 
                    else if (player.currentState === 'jumping') { activeImage = assets.images.jumpImage; cols = player.jumpCols; rows = player.jumpRows; } 
                    else if (player.currentState === 'walk') { activeImage = assets.images.walk; cols = player.walkCols; rows = player.walkRows; } 
                    else if (player.currentState === 'melee') { activeImage = assets.images.melee; cols = player.meleeCols; rows = player.meleeRows; }
                    else { activeImage = assets.images.idle; cols = player.idleCols; rows = player.idleRows; }

                    const sW = activeImage.width / cols, sH = activeImage.height / rows;
                    const sx = (player.currentFrame % cols) * sW, sy = Math.floor(player.currentFrame / cols) * sH;
                    const currentScale = player.currentState === 'aiming' ? player.aimScale : player.currentState === 'jumping' ? player.jumpScale : player.scale;
                    const rW = sW * currentScale * GAME_CFG.WORLD_SCALE, rH = sH * currentScale * GAME_CFG.WORLD_SCALE;
                    const screenX = player.x + (player.width / 2) - (rW / 2) - camera.x;
                    const screenY = player.y + player.height - rH - (player.currentState === 'aiming' ? 12 * GAME_CFG.WORLD_SCALE : 0) - camera.y;
                    
                    ctx.save(); 
                    if (!isMobile) {
                        if (player.slowStack > 0) {
                            ctx.shadowColor = 'cyan';
                            ctx.shadowBlur = 30;
                        } else if (player.currentState === 'melee') { 
                            ctx.shadowColor = 'orange'; 
                            ctx.shadowBlur = 15; 
                        }
                    }

                    if (player.isBlinking) {
                        if (!isMobile) {
                            ctx.filter = 'brightness(1000%) grayscale(100%)'; 
                        } else {
                            ctx.globalCompositeOperation = 'lighter';
                            ctx.globalAlpha = 0.7;
                        }
                    }
                    
                    if (player.facingLeft) { ctx.scale(-1, 1); ctx.drawImage(activeImage, sx, sy, sW, sH, -screenX - rW, screenY, rW, rH); } 
                    else { ctx.drawImage(activeImage, sx, sy, sW, sH, screenX, screenY, rW, rH); }
                    ctx.restore(); 

                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;

                    if (player.slowStack > 0 && assets.images.snowParticle) {
                        const spW = assets.images.snowParticle.width * 0.25 * GAME_CFG.WORLD_SCALE;
                        const spH = assets.images.snowParticle.height * 0.25 * GAME_CFG.WORLD_SCALE;
                        const spX = screenX + (rW / 2) - (spW / 2);

                        ctx.save();
                        if (!isMobile) {
                            ctx.shadowColor = 'cyan';
                            ctx.shadowBlur = 15;
                        }
                        for (let stack = 0; stack < player.slowStack; stack++) {
                            const spY = screenY - (spH * (stack + 1)) - (5 * GAME_CFG.WORLD_SCALE * stack) - 15 * GAME_CFG.WORLD_SCALE;
                            ctx.drawImage(assets.images.snowParticle, spX, spY, spW, spH);
                        }
                        ctx.restore();
                    }
                }

                // Player Mana Bar 
                ctx.save();
                const pBarW = 110; // Scaled up
                const pBarH = 18;  // Scaled up
                const pBarX = player.x + (player.width / 2) - (pBarW / 2) - camera.x;
                const pBarY = player.y + player.height - camera.y - 10;

                ctx.shadowBlur = 0; 
                ctx.fillStyle = "rgba(80,80,80,0.7)";
                ctx.fillRect(pBarX, pBarY, pBarW, pBarH);

                const manaPercent = Math.max(0, player.mana / player.maxMana);
                const mFillW = pBarW * manaPercent;

                if (mFillW > 0) {
                    if (player.mana < 20) {
                        ctx.fillStyle = "#FFFFFF";
                    } else {
                        if (isMobile) {
                            ctx.fillStyle = "#0044cc";
                        } else {
                            const mGrad = ctx.createLinearGradient(pBarX, 0, pBarX + pBarW, 0);
                            mGrad.addColorStop(0, "#80d4ff");
                            mGrad.addColorStop(0.5, "#0099ff");
                            mGrad.addColorStop(1, "#0044cc");
                            ctx.fillStyle = mGrad;
                        }
                    }
                    ctx.fillRect(pBarX, pBarY, mFillW, pBarH);
                }

                ctx.strokeStyle = "rgba(200,200,200,0.9)";
                ctx.lineWidth = 1;
                ctx.strokeRect(pBarX, pBarY, pBarW, pBarH);

                ctx.fillStyle = "#FFFFFF";
                ctx.font = "18px 'Arial White', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`${Math.floor(player.mana)}/${player.maxMana}`, pBarX + pBarW / 2, pBarY + pBarH - 3);
                
                ctx.restore();
                ctx.restore(); // Restore out of Render Scale (World Space)

                // --- UI RENDERING (Scaled to match logical viewport) ---
                ctx.save();
                ctx.scale(renderScale, renderScale);

                let hudWeapon = player.currentWeapon === 'uzi' ? uzi : player.currentWeapon === 'laser' ? laserWep : pistol;
                if (hudWeapon.width > 0 && hudWeapon.pickedUp) {
                    const paddingRight = 30, paddingTop = 10; 
                    ctx.font = "bold 48px sans-serif"; // Scaled up font
                    const isUzi = player.currentWeapon === 'uzi';
                    const isLaser = player.currentWeapon === 'laser';
                    const ammoText = isLaser ? (Math.floor(player.mana).toString().padStart(3, '0') + " / " + player.maxMana) : (hudWeapon.ammo.toString().padStart(2, '0') + " / " + hudWeapon.maxAmmo);
                    const textWidth = ctx.measureText(ammoText).width;
                    const hudRH = isUzi ? pistol.height * 0.71 : pistol.height * 1.03, hudRW = hudRH * (hudWeapon.width / hudWeapon.height); // Scaled up weapons on HUD
                    const scrXWep = logicalViewW - hudRW - paddingRight - textWidth - 15, scrYWep = paddingTop - 15 + (isUzi ? (pistol.height * 0.2) / 2 : 0); 
                    
                    ctx.save(); 
                    if (!isMobile) {
                        ctx.shadowColor = 'white'; 
                        ctx.shadowBlur = 20; 
                        ctx.shadowOffsetY = 10;
                    }
                    const wImg = isUzi ? assets.images.uzi : isLaser ? assets.images.laser : assets.images.pistol;
                    ctx.drawImage(wImg, scrXWep, scrYWep, hudRW, hudRH); ctx.restore();
                    ctx.save(); ctx.fillStyle = "black"; 
                    if (!isMobile) {
                        ctx.shadowColor = 'white'; 
                        ctx.shadowBlur = 10;
                    }
                    ctx.fillText(ammoText, scrXWep + hudRW + 10, paddingTop - 15 + pistol.height / 2 + 20); ctx.restore();
                }

                // Draw Score and Time Centered Top
                ctx.save();
                ctx.fillStyle = "black";
                if (!isMobile) {
                    ctx.shadowColor = "white";
                    ctx.shadowBlur = 10;
                }
                ctx.textAlign = "center";
                
                // 1. Render Score (Slightly larger font)
                ctx.font = "bold 48px sans-serif";
                ctx.fillText(`Score: ${currentScore}`, logicalViewW / 2, 150 * GAME_CFG.WORLD_SCALE);

                // 2. Render Time (Slightly smaller font, always visible)
                const totalSeconds = Math.floor(pistolActiveTimeMs / 1000);
                const mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
                const secs = String(totalSeconds % 60).padStart(2, '0');
                const timeText = `${mins}:${secs}`;
                
                ctx.font = "bold 36px sans-serif"; 
                ctx.fillText(timeText, logicalViewW / 2, 230 * GAME_CFG.WORLD_SCALE);
                
                ctx.restore();

                ctx.save(); 
                if (!isMobile) {
                    ctx.shadowColor = 'red'; 
                    ctx.shadowBlur = 15; 
                    ctx.shadowOffsetY = 5;
                }
                const hudHpW = assets.images.health.width * 0.085 * GAME_CFG.WORLD_SCALE, hudHpH = assets.images.health.height * 0.085 * GAME_CFG.WORLD_SCALE;
                for (let i = 0; i < player.hp; i++) { ctx.drawImage(assets.images.health, 25 + i * (hudHpW + 10), 20, hudHpW, hudHpH); }
                ctx.restore();

                if (!isMobile) {
                    ctx.save();
                    const scoreY = hudHpH;
                    ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                    ctx.fillRect(25, scoreY + 10, 226, 201);

                    const kw = assets.images.keyboardKey.width * 0.039, kh = assets.images.keyboardKey.height * 0.039;
                    ctx.drawImage(assets.images.keyboardKey, 51, scoreY + 1, kw, kh); // A
                    ctx.drawImage(assets.images.keyboardKey, 92, scoreY + 1, kw, kh); // D
                    ctx.drawImage(assets.images.keyboardKey, 55, scoreY + 33, kw, kh); // W
                    ctx.drawImage(assets.images.keyboardKey, 56, scoreY + 65, kw, kh); // K
                    ctx.drawImage(assets.images.keyboardKey, 38, scoreY + 97, kw, kh); // K
                    ctx.drawImage(assets.images.keyboardKey, 86, scoreY + 97, kw, kh); // A
                    ctx.drawImage(assets.images.keyboardKey, 128, scoreY + 97, kw, kh); // K
                    ctx.drawImage(assets.images.keyboardKey, 176, scoreY + 97, kw, kh); // D
                    ctx.drawImage(assets.images.keyboardKey, 55, scoreY + 129, kw, kh); // K
                    ctx.drawImage(assets.images.keyboardKey, 103, scoreY + 129, kw, kh); // S
                    ctx.drawImage(assets.images.keyboardKey, 75, scoreY + 161, kw, kh); // 1
                    ctx.drawImage(assets.images.keyboardKey, 114, scoreY + 161, kw, kh); // 2
                    ctx.drawImage(assets.images.keyboardKey, 153, scoreY + 161, kw, kh); // 3
                    
                    ctx.font = "bold 20px sans-serif"; // Scaled up font and spacing
                    ctx.fillStyle = "black"; 
                    ctx.shadowColor = 'white'; 
                    ctx.shadowBlur = 5;
                    ctx.fillText("Move:  A  /  D", 30, scoreY + 38);
                    ctx.fillText("Jump:  W", 30, scoreY + 70);
                    ctx.fillText("Shoot:  K", 30, scoreY + 102);
                    ctx.fillText("Roll:  K  +  A  /  K  +  D", 30, scoreY + 134);
                    ctx.fillText("Melee:  K  +  S", 30, scoreY + 166);
                    ctx.fillText("Weapon:  1  /  2  /  3", 30, scoreY + 198); 
                    ctx.restore();
                }

                if (gameState === 'GAMEOVER') {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.fillRect(0, 0, logicalViewW, logicalViewH);
                    ctx.fillStyle = "black"; ctx.textAlign = "center";
                    
                    let renderScore = currentScore;
                    let renderHigh = highestScore;

                    if (isInterpolatingGameOver) {
                        const progress = Math.min(1, gameOverTimerMs / 1000);
                        renderScore = Math.floor(progress * scoreAtDeath);
                        renderHigh = Math.max(highScoreAtDeath, renderScore);
                    } else {
                        renderScore = scoreAtDeath;
                        renderHigh = Math.max(highScoreAtDeath, scoreAtDeath);
                    }
                    
                    if (assets.images.gameOver && assets.images.gameOver.width > 0) {
                        const scale = 0.12, scaledWidth = assets.images.gameOver.width * scale, scaledHeight = assets.images.gameOver.height * scale; // Scaled up image
                        const goX = logicalViewW / 2 - scaledWidth / 2, goY = logicalViewH / 2 - scaledHeight / 2 - 100;
                        ctx.drawImage(assets.images.gameOver, goX, goY, scaledWidth, scaledHeight);
                        ctx.font = "bold 28px sans-serif"; // Scaled up
                        ctx.fillText(`Highest Score: ${renderHigh}`, logicalViewW / 2, goY + scaledHeight + 20);
                        ctx.fillText(`New Score: ${renderScore}`, logicalViewW / 2, goY + scaledHeight + 70);
                    }

                    ctx.font = "bold 28px sans-serif"; // Scaled up
                    
                    if (!isInterpolatingGameOver) {
                        if (isMobile) {
                            ctx.fillText("Tap to Continue", logicalViewW / 2, logicalViewH - 60);
                        } else {
                            ctx.drawImage(assets.images.keyboardKey, logicalViewW / 2 - 111, logicalViewH - 108, assets.images.keyboardKey.width * 0.05, assets.images.keyboardKey.height * 0.05);
                            ctx.fillText("Press  P  to Continue", logicalViewW / 2, logicalViewH - 60); 
                        }
                    }
                    ctx.textAlign = "left"; 
                }

                ctx.restore(); // Restore out of UI Scale
            }
        }

        // --- Core Engine Loop ---
        let lastTime = 0;
        let accumulator = 0;

        function gameLoop(time) {
            const deltaTime = time - lastTime;
            lastTime = time;

            // Bind the visibility strictly to the playing state every frame
            if (isMobile) {
                const controls = document.getElementById('mobile-controls');
                if (gameState === 'PLAYING') {
                    if (controls.style.display !== 'block') controls.style.display = 'block';
                } else {
                    if (controls.style.display !== 'none') controls.style.display = 'none';
                }
            }

            // Both LOADING and TAP_TO_START rely on the same UI renderer
            if (gameState === 'LOADING' || gameState === 'LOADING_DONE_WAITING' || gameState === 'TAP_TO_START') {
                renderLoading(deltaTime);
            } else {
                accumulator += deltaTime;
                while (accumulator >= GAME_CFG.TIME_STEP) {
                    update();
                    accumulator -= GAME_CFG.TIME_STEP;
                }
                render();
            }
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            // Implement mobile DPR cap
            const maxDpr = isMobile ? Math.min(window.devicePixelRatio || 1, 1.5) : window.devicePixelRatio || 1;
            
            canvas.width = window.innerWidth * maxDpr;
            canvas.height = window.innerHeight * maxDpr;
            
            ctx.imageSmoothingEnabled = true;
            // Cap smoothing quality on mobile
            ctx.imageSmoothingQuality = isMobile ? 'low' : 'high';

            if (world.height > 0) {
                renderScale = canvas.height / world.height;
            }

            if (isMobile) {
                updateButtonCenters();
            }
        }

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas(); // Call this immediately to fix the blurry loading screen!
        preloadGame();
        requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
        
    </script>
</body>
</html>
